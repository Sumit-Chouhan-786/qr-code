<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to QR | OnlineQrs</title>
<meta name="description" content="Image URL se QR code banao instantly">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-image" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Image to QR</h1>
<p class="mb-0">Image URL se QR code banao instantly</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Image URL enter karo:</label>
<input type="url" class="form-control cartoon-input" id="imgURL" placeholder="https://example.com/image.jpg"></div>
<div class="mb-3"><label class="form-label fw-bold">QR Color:</label>
<input type="color" class="form-control cartoon-input" id="iqColor" value="#d35400" style="height:46px;max-width:120px;"></div>
<button class="btn cartoon-btn w-100" onclick="genImgQR()"><i class="bi bi-magic me-2"></i>Generate QR</button>
<div id="iqResult" class="result-box text-center" style="display:none;">
<div id="iqQR" class="d-inline-block mb-3"></div>
<div><button class="btn btn-success cartoon-btn" onclick="dlIQ()"><i class="bi bi-download me-2"></i>Download</button></div>
</div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function genImgQR(){
  var url=document.getElementById('imgURL').value.trim();
  if(!url){alert('URL enter karo.');return;}
  var div=document.getElementById('iqQR');div.innerHTML='';
  new QRCode(div,{text:url,width:250,height:250,colorDark:document.getElementById('iqColor').value,colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('iqResult').style.display='';
}
function dlIQ(){var c=document.querySelector('#iqQR canvas');if(!c)return;var a=document.createElement('a');a.download='image-qr.png';a.href=c.toDataURL();a.click();}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
