<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Color Picker | OnlineQrs</title>
<meta name="description" content="Image se color pick karo ya color codes convert karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-palette" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Color Picker</h1>
<p class="mb-0">Image se color pick karo ya color codes convert karo</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-4">
<h5 style="color:var(--primary);">Image se Color Pick karo</h5>
<input type="file" class="form-control cartoon-input mb-2" id="cpImg" accept="image/*" onchange="loadCP(this)">
<canvas id="cpCanvas" style="max-width:100%;border-radius:12px;cursor:crosshair;border:3px solid var(--primary);display:none;"></canvas>
<div id="cpPreview" style="display:none;" class="mt-3 p-3 cartoon-card">
<div class="d-flex align-items-center gap-3">
<div id="cpSwatch" style="width:60px;height:60px;border-radius:12px;border:3px solid var(--primary);"></div>
<div>
<p class="mb-1 fw-bold">HEX: <span id="cpHex">#000000</span></p>
<p class="mb-1 fw-bold">RGB: <span id="cpRGB">0, 0, 0</span></p>
<p class="mb-0 fw-bold">HSL: <span id="cpHSL">0°, 0%, 0%</span></p>
</div>
<button class="btn btn-primary cartoon-btn btn-sm" onclick="cpCopy()"><i class="bi bi-copy me-1"></i>Copy HEX</button>
</div>
</div>
</div>
<hr>
<div>
<h5 style="color:var(--primary);">Color Code Converter</h5>
<div class="row g-2">
<div class="col-md-4"><label class="form-label fw-bold">HEX:</label><input type="text" class="form-control cartoon-input" id="hexIn" placeholder="#d35400" oninput="hexConv(this.value)"></div>
<div class="col-md-4"><label class="form-label fw-bold">RGB:</label><input type="text" class="form-control cartoon-input" id="rgbOut" placeholder="211, 84, 0" readonly></div>
<div class="col-md-4"><label class="form-label fw-bold">HSL:</label><input type="text" class="form-control cartoon-input" id="hslOut" placeholder="23°, 100%, 41%" readonly></div>
</div>
<div id="hexSwatch" style="height:40px;border-radius:10px;margin-top:10px;border:3px solid var(--primary);background:#d35400;"></div>
</div>
</div></div></div>
<script>
var cpCtx=null;
function loadCP(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){
    var img=new Image();img.onload=function(){
      var c=document.getElementById('cpCanvas');
      c.width=img.width;c.height=img.height;c.style.display='';
      cpCtx=c.getContext('2d');cpCtx.drawImage(img,0,0);
    };img.src=e.target.result;
  };r.readAsDataURL(f);
}
document.getElementById('cpCanvas').addEventListener('click',function(e){
  if(!cpCtx)return;
  var rect=this.getBoundingClientRect();
  var x=Math.round((e.clientX-rect.left)*(this.width/rect.width));
  var y=Math.round((e.clientY-rect.top)*(this.height/rect.height));
  var d=cpCtx.getImageData(x,y,1,1).data;
  var hex='#'+[d[0],d[1],d[2]].map(function(v){return v.toString(16).padStart(2,'0');}).join('');
  document.getElementById('cpSwatch').style.background=hex;
  document.getElementById('cpHex').textContent=hex;
  document.getElementById('cpRGB').textContent=d[0]+', '+d[1]+', '+d[2];
  document.getElementById('cpHSL').textContent=toHSL(d[0],d[1],d[2]);
  document.getElementById('cpPreview').style.display='';
});
function toHSL(r,g,b){r/=255;g/=255;b/=255;var max=Math.max(r,g,b),min=Math.min(r,g,b),h,s,l=(max+min)/2;if(max===min){h=s=0;}else{var d=max-min;s=l>.5?d/(2-max-min):d/(max+min);if(max===r)h=((g-b)/d+(g<b?6:0))/6;else if(max===g)h=((b-r)/d+2)/6;else h=((r-g)/d+4)/6;}return Math.round(h*360)+'°, '+Math.round(s*100)+'%, '+Math.round(l*100)+'%';}
function cpCopy(){navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('cpHex').textContent);}
function hexConv(v){
  var hex=v.trim().replace('#','');
  if(hex.length!==6)return;
  var r=parseInt(hex.substring(0,2),16),g=parseInt(hex.substring(2,4),16),b=parseInt(hex.substring(4,6),16);
  document.getElementById('rgbOut').value=r+', '+g+', '+b;
  document.getElementById('hslOut').value=toHSL(r,g,b);
  document.getElementById('hexSwatch').style.background='#'+hex;
}
hexConv('#d35400');
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
