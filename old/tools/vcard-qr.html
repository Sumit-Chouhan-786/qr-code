<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>vCard QR Generator | OnlineQrs</title>
<meta name="description" content="Contact card QR banao — scan karke directly phone mein save hoga">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-person-vcard" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">vCard QR Generator</h1>
<p class="mb-0">Contact card QR banao — scan karke directly phone mein save hoga</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="row g-3">
<div class="col-md-6"><label class="form-label fw-bold">First Name *</label><input type="text" class="form-control cartoon-input" id="vcFN" placeholder="Rahul"></div>
<div class="col-md-6"><label class="form-label fw-bold">Last Name</label><input type="text" class="form-control cartoon-input" id="vcLN" placeholder="Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Phone</label><input type="tel" class="form-control cartoon-input" id="vcPhone" placeholder="+91 98765 43210"></div>
<div class="col-md-6"><label class="form-label fw-bold">Email</label><input type="email" class="form-control cartoon-input" id="vcEmail" placeholder="rahul@email.com"></div>
<div class="col-md-6"><label class="form-label fw-bold">Company</label><input type="text" class="form-control cartoon-input" id="vcOrg" placeholder="My Company"></div>
<div class="col-md-6"><label class="form-label fw-bold">Job Title</label><input type="text" class="form-control cartoon-input" id="vcTitle" placeholder="Developer"></div>
<div class="col-md-6"><label class="form-label fw-bold">Website</label><input type="url" class="form-control cartoon-input" id="vcURL" placeholder="https://mywebsite.com"></div>
<div class="col-md-6"><label class="form-label fw-bold">Address</label><input type="text" class="form-control cartoon-input" id="vcAddr" placeholder="Mumbai, India"></div>
<div class="col-12"><label class="form-label fw-bold">QR Color</label><input type="color" class="form-control cartoon-input" id="vcColor" value="#d35400" style="height:46px;max-width:120px;"></div>
</div>
<button class="btn cartoon-btn w-100 mt-3" onclick="genVCard()"><i class="bi bi-magic me-2"></i>Generate vCard QR</button>
<div id="vcResult" class="result-box text-center" style="display:none;">
<div id="vcQR" class="d-inline-block"></div>
<div class="mt-3"><button class="btn btn-success cartoon-btn" onclick="dlVC()"><i class="bi bi-download me-2"></i>Download PNG</button></div>
</div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function genVCard(){
  var fn=document.getElementById('vcFN').value.trim();
  if(!fn){alert('First Name required.');return;}
  var ln=document.getElementById('vcLN').value.trim();
  var vc='BEGIN:VCARD\nVERSION:3.0\nFN:'+fn+' '+ln+'\nN:'+ln+';'+fn+';;;';
  var ph=document.getElementById('vcPhone').value.trim();if(ph)vc+='\nTEL:'+ph;
  var em=document.getElementById('vcEmail').value.trim();if(em)vc+='\nEMAIL:'+em;
  var org=document.getElementById('vcOrg').value.trim();if(org)vc+='\nORG:'+org;
  var ttl=document.getElementById('vcTitle').value.trim();if(ttl)vc+='\nTITLE:'+ttl;
  var url=document.getElementById('vcURL').value.trim();if(url)vc+='\nURL:'+url;
  var adr=document.getElementById('vcAddr').value.trim();if(adr)vc+='\nADR:;;'+adr+';;;;';
  vc+='\nEND:VCARD';
  var div=document.getElementById('vcQR');div.innerHTML='';
  new QRCode(div,{text:vc,width:250,height:250,colorDark:document.getElementById('vcColor').value,colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('vcResult').style.display='';
}
function dlVC(){
  var c=document.querySelector('#vcQR canvas');if(!c)return;
  var a=document.createElement('a');a.download='vcard-qr.png';a.href=c.toDataURL();a.click();
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
