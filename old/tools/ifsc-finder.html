<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>IFSC Code Finder | OnlineQrs</title>
<meta name="description" content="Bank branch details nikalo IFSC code se — RBI data">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-bank" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">IFSC Code Finder</h1>
<p class="mb-0">Bank branch details nikalo IFSC code se — RBI data</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">IFSC Code enter karo:</label>
<input type="text" class="form-control cartoon-input" id="ifscIn" placeholder="SBIN0001234" maxlength="11" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()"></div>
<button class="btn cartoon-btn w-100" onclick="findIFSC()"><i class="bi bi-search me-2"></i>Find Bank Details</button>
<div id="ifscResult" class="result-box mt-3" style="display:none;"></div>
<div id="ifscError" class="alert alert-danger mt-3" style="display:none;"></div>
</div></div></div>
<script>
function findIFSC(){
  var code=document.getElementById('ifscIn').value.trim().toUpperCase();
  if(code.length!==11){alert('IFSC code 11 characters ka hota hai.');return;}
  document.getElementById('ifscError').style.display='none';
  document.getElementById('ifscResult').style.display='none';
  fetch('https://ifsc.razorpay.com/'+code)
    .then(function(r){if(!r.ok)throw new Error('Not found');return r.json();})
    .then(function(d){
      document.getElementById('ifscResult').innerHTML=
        '<table class="table table-sm"><tbody>'
        +'<tr><th>Bank</th><td>'+d.BANK+'</td></tr>'
        +'<tr><th>Branch</th><td>'+d.BRANCH+'</td></tr>'
        +'<tr><th>City</th><td>'+d.CITY+'</td></tr>'
        +'<tr><th>State</th><td>'+d.STATE+'</td></tr>'
        +'<tr><th>District</th><td>'+d.DISTRICT+'</td></tr>'
        +'<tr><th>Address</th><td>'+d.ADDRESS+'</td></tr>'
        +'<tr><th>MICR</th><td>'+d.MICR+'</td></tr>'
        +'<tr><th>IFSC</th><td><strong>'+d.IFSC+'</strong></td></tr>'
        +'</tbody></table>';
      document.getElementById('ifscResult').style.display='';
    })
    .catch(function(){
      document.getElementById('ifscError').textContent='IFSC code nahi mila. Check karo aur dobara try karo.';
      document.getElementById('ifscError').style.display='';
    });
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
