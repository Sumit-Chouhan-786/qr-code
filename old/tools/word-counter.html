<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Word Counter | OnlineQrs</title>
<meta name="description" content="Words, characters, sentences, paragraphs count karo instantly">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-fonts" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Word Counter</h1>
<p class="mb-0">Words, characters, sentences, paragraphs count karo instantly</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Text yahan paste karo:</label>
<textarea class="form-control cartoon-input" id="wcText" rows="10" placeholder="Apna text yahan type ya paste karo..." oninput="countAll()"></textarea></div>
<div class="row g-3" id="wcStats">
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcWords" style="color:var(--primary);">0</div><small>Words</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcChars" style="color:var(--primary);">0</div><small>Characters</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcNoSp" style="color:var(--primary);">0</div><small>No Spaces</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcSent" style="color:var(--primary);">0</div><small>Sentences</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcPara" style="color:var(--primary);">0</div><small>Paragraphs</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcRead" style="color:var(--primary);">0</div><small>Read (min)</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcLines" style="color:var(--primary);">0</div><small>Lines</small></div></div>
<div class="col-6 col-md-3"><div class="cartoon-card p-3 text-center"><div class="h3 mb-0" id="wcUnique" style="color:var(--primary);">0</div><small>Unique Words</small></div></div>
</div>
<div class="d-flex gap-2 mt-3">
<button class="btn btn-outline-success cartoon-btn" onclick="document.getElementById('wcText').value='';countAll();"><i class="bi bi-trash me-1"></i>Clear</button>
<button class="btn btn-primary cartoon-btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('wcText').value)"><i class="bi bi-copy me-1"></i>Copy</button>
</div>
</div></div></div>
<script>
function countAll(){
  var t=document.getElementById('wcText').value;
  var words=t.trim().length?t.trim().split(/\s+/).filter(Boolean):[];
  document.getElementById('wcWords').textContent=words.length;
  document.getElementById('wcChars').textContent=t.length;
  document.getElementById('wcNoSp').textContent=t.replace(/\s/g,'').length;
  document.getElementById('wcSent').textContent=t.trim().length?(t.match(/[.!?]+/g)||[]).length:0;
  document.getElementById('wcPara').textContent=t.trim().length?t.trim().split(/\n\s*\n/).filter(Boolean).length:0;
  document.getElementById('wcRead').textContent=Math.ceil(words.length/200);
  document.getElementById('wcLines').textContent=t.length?t.split('\n').length:0;
  var unique=new Set(words.map(function(w){return w.toLowerCase().replace(/[^a-z]/g,'');}));
  document.getElementById('wcUnique').textContent=unique.size;
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
