<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Lorem Ipsum Generator | OnlineQrs</title>
<meta name="description" content="Dummy placeholder text generate karo — writers/designers ke liye">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-paragraph" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Lorem Ipsum Generator</h1>
<p class="mb-0">Dummy placeholder text generate karo — writers/designers ke liye</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-4"><label class="form-label fw-bold">Type:</label>
<select class="form-select cartoon-input" id="loType"><option value="para">Paragraphs</option><option value="sent">Sentences</option><option value="word">Words</option></select></div>
<div class="col-md-4"><label class="form-label fw-bold">Count:</label>
<input type="number" class="form-control cartoon-input" id="loCount" value="3" min="1" max="50"></div>
<div class="col-md-4 d-flex align-items-end">
<button class="btn cartoon-btn w-100" onclick="genLorem()"><i class="bi bi-magic me-2"></i>Generate</button>
</div>
</div>
<div class="mb-3"><label class="form-label fw-bold">Output:</label>
<textarea class="form-control cartoon-input" id="loOut" rows="10" readonly></textarea></div>
<button class="btn btn-primary cartoon-btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('loOut').value)"><i class="bi bi-copy me-1"></i>Copy Text</button>
</div></div></div>
<script>
var LOREM="Lorem ipsum dolor sit amet consectetur adipiscing elit sed do eiusmod tempor incididunt ut labore et dolore magna aliqua Ut enim ad minim veniam quis nostrud exercitation ullamco laboris nisi ut aliquip ex ea commodo consequat Duis aute irure dolor in reprehenderit in voluptate velit esse cillum dolore eu fugiat nulla pariatur Excepteur sint occaecat cupidatat non proident sunt in culpa qui officia deserunt mollit anim id est laborum Sed ut perspiciatis unde omnis iste natus error sit voluptatem accusantium doloremque laudantium totam rem aperiam eaque ipsa quae ab illo inventore veritatis et quasi architecto beatae vitae dicta sunt explicabo".split(' ');
function genLorem(){
  var type=document.getElementById('loType').value;
  var count=Math.min(50,Math.max(1,parseInt(document.getElementById('loCount').value)||3));
  var out='';
  if(type==='word'){
    out=LOREM.slice(0,count).join(' ');
  } else if(type==='sent'){
    for(var i=0;i<count;i++){
      var wc=10+Math.floor(Math.random()*10);
      var words=[];for(var j=0;j<wc;j++)words.push(LOREM[Math.floor(Math.random()*LOREM.length)]);
      out+=words[0].charAt(0).toUpperCase()+words[0].slice(1)+' '+words.slice(1).join(' ')+'. ';
    }
  } else {
    for(var i=0;i<count;i++){
      var sc=3+Math.floor(Math.random()*4),para='';
      for(var s=0;s<sc;s++){
        var wc=8+Math.floor(Math.random()*12);
        var words=[];for(var j=0;j<wc;j++)words.push(LOREM[Math.floor(Math.random()*LOREM.length)]);
        para+=words[0].charAt(0).toUpperCase()+words[0].slice(1)+' '+words.slice(1).join(' ')+'. ';
      }
      out+=para.trim()+'\n\n';
    }
  }
  document.getElementById('loOut').value=out.trim();
}
genLorem();
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
