<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Stamp Paper / Affidavit Generator | OnlineQrs</title>
<meta name="description" content="General affidavit aur declarations PDF banao free mein">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-file-earmark-stamp" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Stamp Paper / Affidavit Generator</h1>
<p class="mb-0">General affidavit aur declarations PDF banao free mein</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Document Type:</label>
<select class="form-select cartoon-input" id="dt"><option>General Affidavit</option><option>Declaration Letter</option><option>Indemnity Bond</option><option>Self Declaration</option></select></div>
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Deponent Name *</label><input type="text" class="form-control cartoon-input" id="dn" placeholder="Rahul Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">S/o D/o W/o</label><input type="text" class="form-control cartoon-input" id="father" placeholder="Suresh Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Address</label><input type="text" class="form-control cartoon-input" id="addr" placeholder="Mumbai, Maharashtra"></div>
<div class="col-md-6"><label class="form-label fw-bold">Stamp Value</label>
<select class="form-select cartoon-input" id="sv"><option>Rs.10</option><option>Rs.20</option><option>Rs.50</option><option>Rs.100</option><option>Rs.200</option><option>Rs.500</option></select></div>
</div>
<div class="mb-3"><label class="form-label fw-bold">Declaration Content *</label>
<textarea class="form-control cartoon-input" id="content" rows="6" placeholder="I, the above-named deponent, do hereby solemnly affirm:&#10;1. That I am the owner of...&#10;2. That..."></textarea></div>
<div class="mb-3"><label class="form-label fw-bold">Place</label><input type="text" class="form-control cartoon-input" id="place" placeholder="Mumbai"></div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-file-pdf me-2"></i>Generate Document PDF</button>
</div></div></div>
<script>
function gen(){
  var dn=document.getElementById('dn').value.trim(),content=document.getElementById('content').value.trim();
  if(!dn||!content){alert('Deponent name aur content required.');return;}
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF();
  var sv=document.getElementById('sv').value,dt=document.getElementById('dt').value;
  pdf.setDrawColor(150);pdf.setLineWidth(0.5);pdf.rect(8,8,194,281);pdf.rect(10,10,190,277);
  pdf.setFillColor(240,240,240);pdf.rect(10,10,190,18,'F');
  pdf.setFontSize(9);pdf.setTextColor(100);pdf.text('NON-JUDICIAL STAMP PAPER — '+sv,105,21,{align:'center'});
  pdf.setFontSize(14);pdf.setFont(undefined,'bold');pdf.setTextColor(0);pdf.text(dt.toUpperCase(),105,45,{align:'center'});
  pdf.setFontSize(10);pdf.setFont(undefined,'normal');
  var y=58;
  var f=document.getElementById('father').value.trim(),a=document.getElementById('addr').value.trim();
  pdf.text('I, '+dn+(f?', S/o D/o W/o '+f:'')+',',14,y);y+=7;
  if(a){pdf.text('Resident of '+a+',',14,y);y+=7;}
  pdf.text('do hereby state on solemn affirmation as follows:',14,y);y+=12;
  var lines=pdf.splitTextToSize(content,178);pdf.text(lines,14,y);y+=lines.length*6+15;
  pdf.text('VERIFICATION',105,y,{align:'center'});y+=8;
  var v='I, '+dn+', verify that the contents of this affidavit are true and correct to the best of my knowledge.';
  var vl=pdf.splitTextToSize(v,178);pdf.text(vl,14,y);y+=vl.length*6+20;
  var pl=document.getElementById('place').value.trim()||'India';
  pdf.text('Verified at '+pl+' on '+new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),14,y);y+=20;
  pdf.line(14,y,80,y);pdf.line(130,y,196,y);y+=6;
  pdf.text('Deponent Signature',14,y);pdf.text('Notary / Witness',130,y);
  pdf.setFontSize(7);pdf.setTextColor(150);pdf.text('Generated by OnlineQrs.com | Consult a lawyer for legal matters.',105,285,{align:'center'});
  pdf.save(dt.replace(/ /g,'-')+'.pdf');
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
