<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Gratuity Calculator | OnlineQrs</title>
<meta name="description" content="5+ saal ki service ke baad gratuity amount nikalo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-award" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Gratuity Calculator</h1>
<p class="mb-0">5+ saal ki service ke baad gratuity amount nikalo</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Last Basic Salary (Rs./month):</label><input type="number" class="form-control cartoon-input" id="b" placeholder="50000" oninput="calc()"></div>
<div class="mb-3"><label class="form-label fw-bold">DA Amount (Rs./month, if any):</label><input type="number" class="form-control cartoon-input" id="da" placeholder="0" oninput="calc()"></div>
<div class="mb-3"><label class="form-label fw-bold">Years of Service:</label><input type="number" class="form-control cartoon-input" id="y" placeholder="10" step="0.5" oninput="calc()"></div>
<div class="mb-3"><label class="form-label fw-bold">Employee Type:</label>
<select class="form-select cartoon-input" id="et" onchange="calc()">
<option value="26">Covered under Gratuity Act (26 divisor)</option>
<option value="30">Not covered (30 divisor)</option>
</select></div>
<div id="res" class="result-box" style="display:none;">
<div class="row g-3 text-center">
<div class="col-6"><div class="cartoon-card p-3"><small>Gratuity Amount</small><div class="h4 mb-0" style="color:var(--primary);" id="rg">Rs.0</div></div></div>
<div class="col-6"><div class="cartoon-card p-3"><small>Tax Exempt Limit</small><div class="h4 mb-0" style="color:var(--success);">Rs.20,00,000</div></div></div>
</div>
<p class="text-muted small mt-2 mb-0" id="rf"></p>
</div>
</div></div></div>
<script>
function calc(){
  var b=parseFloat(document.getElementById('b').value)||0;
  var da=parseFloat(document.getElementById('da').value)||0;
  var y=parseFloat(document.getElementById('y').value)||0;
  var div=parseInt(document.getElementById('et').value);
  var g=Math.min((b+da)*15*y/div,2000000);
  document.getElementById('rg').textContent='Rs.'+Math.round(g).toLocaleString('en-IN');
  document.getElementById('rf').textContent='Formula: (Basic+DA) x 15 x Years / '+div+' | Minimum 5 years required';
  document.getElementById('res').style.display='';
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
