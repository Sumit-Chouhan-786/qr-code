<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Business Card + QR Generator | OnlineQrs</title>
<meta name="description" content="Digital business card banao aur QR ke saath download karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-credit-card-2-front" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Business Card + QR Generator</h1>
<p class="mb-0">Digital business card banao aur QR ke saath download karo</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-9">
<div class="cartoon-card p-4">
<div class="row g-3 mb-4">
<div class="col-md-6"><label class="form-label fw-bold">Full Name *</label><input type="text" class="form-control cartoon-input" id="n" placeholder="Rahul Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Job Title</label><input type="text" class="form-control cartoon-input" id="jt" placeholder="Founder & CEO"></div>
<div class="col-md-6"><label class="form-label fw-bold">Company</label><input type="text" class="form-control cartoon-input" id="co" placeholder="My Company Pvt Ltd"></div>
<div class="col-md-6"><label class="form-label fw-bold">Phone</label><input type="text" class="form-control cartoon-input" id="ph" placeholder="+91 98765 43210"></div>
<div class="col-md-6"><label class="form-label fw-bold">Email</label><input type="email" class="form-control cartoon-input" id="em" placeholder="rahul@company.com"></div>
<div class="col-md-6"><label class="form-label fw-bold">Website</label><input type="text" class="form-control cartoon-input" id="wb" placeholder="www.mycompany.com"></div>
<div class="col-md-6"><label class="form-label fw-bold">Card Color</label><input type="color" class="form-control cartoon-input" id="cc" value="#d35400" style="height:46px;"></div>
<div class="col-md-6"><label class="form-label fw-bold">Text Color</label><input type="color" class="form-control cartoon-input" id="tc" value="#ffffff" style="height:46px;"></div>
</div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-magic me-2"></i>Generate Business Card</button>
<div id="res" class="mt-4" style="display:none;">
<canvas id="cv" style="max-width:100%;border-radius:16px;box-shadow:0 8px 24px rgba(0,0,0,.2);"></canvas>
<div class="mt-3"><button class="btn btn-success cartoon-btn" onclick="dl()"><i class="bi bi-download me-2"></i>Download Card (PNG)</button></div>
</div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
function gen(){
  var name=document.getElementById('n').value.trim();
  if(!name){alert('Name required');return;}
  var bg=document.getElementById('cc').value,tc=document.getElementById('tc').value;
  var W=800,H=450,c=document.getElementById('cv');c.width=W;c.height=H;
  var ctx=c.getContext('2d');
  ctx.fillStyle=bg;ctx.fillRect(0,0,W,H);
  ctx.fillStyle='rgba(255,255,255,0.07)';ctx.beginPath();ctx.arc(W-80,H+60,220,0,Math.PI*2);ctx.fill();
  ctx.fillStyle=tc;
  ctx.font='bold 42px serif';ctx.fillText(name,60,100);
  var jt=document.getElementById('jt').value;
  if(jt){ctx.font='22px sans-serif';ctx.globalAlpha=0.8;ctx.fillText(jt,60,138);}
  var co=document.getElementById('co').value;
  if(co){ctx.font='18px sans-serif';ctx.globalAlpha=0.65;ctx.fillText(co,60,170);}
  ctx.globalAlpha=1;var y=230;
  function row(ic,txt){if(!txt)return;ctx.font='16px sans-serif';ctx.globalAlpha=0.9;ctx.fillStyle=tc;ctx.fillText(ic+' '+txt,60,y);y+=34;}
  row('P',document.getElementById('ph').value);
  row('E',document.getElementById('em').value);
  row('W',document.getElementById('wb').value);
  var vc='BEGIN:VCARD
VERSION:3.0
FN:'+name+'
TEL:'+document.getElementById('ph').value+'
EMAIL:'+document.getElementById('em').value+'
END:VCARD';
  var tmp=document.createElement('div');tmp.style.cssText='position:absolute;left:-9999px;';document.body.appendChild(tmp);
  new QRCode(tmp,{text:vc,width:110,height:110,correctLevel:QRCode.CorrectLevel.H});
  setTimeout(function(){
    var qc=tmp.querySelector('canvas')||tmp.querySelector('img');
    if(qc){ctx.globalAlpha=1;ctx.fillStyle='#fff';ctx.fillRect(W-160,H-155,130,130);ctx.drawImage(qc,W-157,H-152,124,124);}
    document.body.removeChild(tmp);
    document.getElementById('res').style.display='';
  },300);
}
function dl(){var a=document.createElement('a');a.download='business-card.png';a.href=document.getElementById('cv').toDataURL();a.click();}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
