<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>RegEx Tester | OnlineQrs</title>
<meta name="description" content="Regular expressions test karo — live match highlighting ke saath">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-search" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">RegEx Tester</h1>
<p class="mb-0">Regular expressions test karo — live match highlighting ke saath</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-9">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Regular Expression:</label>
<div class="input-group">
<span class="input-group-text" style="background:var(--card);border:3px solid var(--primary);border-right:none;border-radius:15px 0 0 15px;color:var(--primary);font-weight:bold;">/</span>
<input type="text" class="form-control cartoon-input" id="pat" value="[a-z]+" oninput="test()" style="border-radius:0;border-left:none;border-right:none;">
<input type="text" class="form-control cartoon-input" id="flg" value="g" oninput="test()" style="max-width:70px;border-radius:0 15px 15px 0;border-left:none;">
</div></div>
<div class="mb-3"><label class="form-label fw-bold">Test String:</label>
<textarea class="form-control cartoon-input" id="ts" rows="4" oninput="test()">Hello World 123 foo@bar.com https://example.com</textarea></div>
<div class="mb-3"><label class="form-label fw-bold">Matches:</label>
<div id="hl" style="min-height:50px;background:var(--card);border:3px solid var(--primary);border-radius:15px;padding:.7rem 1rem;font-family:monospace;word-break:break-all;line-height:2;"></div></div>
<div id="stats" class="row g-3 mb-3"></div>
<div><label class="form-label fw-bold">Common Patterns:</label>
<div class="d-flex flex-wrap gap-2">
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('[a-zA-Z]+','g')">Words</button>
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('[0-9]+','g')">Numbers</button>
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('[\w.-]+@[\w.-]+\.[a-z]{2,}','g')">Email</button>
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('https?://[^\s]+','g')">URLs</button>
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('[6-9][0-9]{9}','g')">Indian Phone</button>
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="sp('[A-Z]{5}[0-9]{4}[A-Z]','g')">PAN Card</button>
</div></div>
</div></div></div>
<script>
function sp(p,f){document.getElementById('pat').value=p;document.getElementById('flg').value=f;test();}
function test(){
  var p=document.getElementById('pat').value,f=document.getElementById('flg').value,t=document.getElementById('ts').value;
  if(!p){document.getElementById('hl').textContent=t;document.getElementById('stats').innerHTML='';return;}
  try{
    var re=new RegExp(p,f);
    var matches=[];var m;var re2=new RegExp(p,'g'+f.replace('g',''));
    while((m=re2.exec(t))!==null){matches.push(m[0]);}
    var hl=t.replace(re,function(match){return '<mark style="background:#ffd700;border-radius:4px;padding:1px 3px;font-weight:bold;">'+match.replace(/&/g,'&amp;').replace(/</g,'&lt;')+'</mark>';});
    document.getElementById('hl').innerHTML=hl.replace(/
/g,'<br>');
    document.getElementById('stats').innerHTML='<div class="col-4"><div class="cartoon-card p-2 text-center"><div class="h4 mb-0" style="color:var(--primary);">'+matches.length+'</div><small>Matches</small></div></div>'
      +'<div class="col-8"><div class="cartoon-card p-2"><small class="fw-bold">Values: </small><small style="font-family:monospace;">'+matches.slice(0,8).join(', ')+(matches.length>8?' ...':'')+'</small></div></div>';
  }catch(e){document.getElementById('hl').innerHTML='<span style="color:var(--danger);">Invalid RegEx: '+e.message+'</span>';}
}
test();
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
