<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Bulk QR Generator | OnlineQrs</title>
<meta name="description" content="Multiple QR codes ek saath banao — CSV ya manual list se">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-grid-3x3" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Bulk QR Generator</h1>
<p class="mb-0">Multiple QR codes ek saath banao — CSV ya manual list se</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-3">
<label class="form-label fw-bold">CSV Upload karo (ek column, URLs/text):</label>
<input type="file" class="form-control cartoon-input" id="csvFile" accept=".csv,.txt" onchange="loadCSV(this)">
</div>
<div class="mb-3">
<label class="form-label fw-bold">Ya manually enter karo (ek per line):</label>
<textarea id="bulkText" class="form-control cartoon-input" rows="6" placeholder="https://example.com&#10;https://google.com&#10;Hello World"></textarea>
</div>
<div class="row g-2 mb-3">
<div class="col-md-4">
<label class="form-label fw-bold">Color:</label>
<input type="color" class="form-control cartoon-input" id="bulkColor" value="#d35400" style="height:46px;">
</div>
<div class="col-md-4">
<label class="form-label fw-bold">Size (px):</label>
<select class="form-select cartoon-input" id="bulkSize">
<option value="150">150</option><option value="200" selected>200</option><option value="300">300</option>
</select>
</div>
</div>
<button class="btn cartoon-btn w-100" onclick="generateBulk()"><i class="bi bi-magic me-2"></i>Generate All QR Codes</button>
<div id="bulkOut" class="mt-4 row g-3"></div>
<div id="dlAllBtn" style="display:none;" class="mt-3">
<button class="btn btn-success cartoon-btn w-100" onclick="downloadAll()"><i class="bi bi-download me-2"></i>Download All as ZIP</button>
</div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jszip@3.10.1/dist/jszip.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/file-saver@2.0.5/dist/FileSaver.min.js"></script>
<script>
var qrDataUrls=[];
function loadCSV(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){document.getElementById('bulkText').value=e.target.result.trim();};r.readAsText(f);
}
function generateBulk(){
  var lines=document.getElementById('bulkText').value.split('\n').map(function(l){return l.trim();}).filter(Boolean);
  if(!lines.length){alert('Kuch text enter karo.');return;}
  var color=document.getElementById('bulkColor').value;
  var size=parseInt(document.getElementById('bulkSize').value);
  var out=document.getElementById('bulkOut');out.innerHTML='';qrDataUrls=[];
  lines.forEach(function(txt,i){
    var col=document.createElement('div');col.className='col-6 col-md-3 text-center';
    var wrap=document.createElement('div');wrap.style.cssText='background:#fff;border:3px solid var(--primary);border-radius:14px;padding:10px;';
    var qDiv=document.createElement('div');wrap.appendChild(qDiv);
    var label=document.createElement('p');label.style.cssText='font-size:.7rem;margin:6px 0 0;word-break:break-all;color:#333;';label.textContent=txt.length>30?txt.substring(0,30)+'...':txt;
    wrap.appendChild(label);col.appendChild(wrap);out.appendChild(col);
    new QRCode(qDiv,{text:txt,width:size,height:size,colorDark:color,colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
    setTimeout(function(){
      var canvas=qDiv.querySelector('canvas')||qDiv.querySelector('img');
      if(canvas&&canvas.toDataURL)qrDataUrls.push({name:'qr-'+(i+1)+'.png',url:canvas.toDataURL()});
    },400);
  });
  document.getElementById('dlAllBtn').style.display='';
}
function downloadAll(){
  var zip=new JSZip();
  qrDataUrls.forEach(function(q){zip.file(q.name,q.url.split(',')[1],{base64:true});});
  zip.generateAsync({type:'blob'}).then(function(b){saveAs(b,'OnlineQrs-bulk-qr.zip');});
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
