<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Barcode Generator | OnlineQrs</title>
<meta name="description" content="EAN-13, Code128, UPC barcodes free mein banao">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-upc-scan" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Barcode Generator</h1>
<p class="mb-0">EAN-13, Code128, UPC barcodes free mein banao</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3">
<label class="form-label fw-bold">Barcode Type:</label>
<select class="form-select cartoon-input" id="bcType">
<option value="CODE128">Code128 (Any text)</option>
<option value="EAN13">EAN-13 (12 digits)</option>
<option value="UPC">UPC-A (11 digits)</option>
<option value="CODE39">Code39</option>
<option value="ITF14">ITF-14</option>
</select>
</div>
<div class="mb-3">
<label class="form-label fw-bold">Content:</label>
<input type="text" class="form-control cartoon-input" id="bcText" placeholder="Enter barcode content..." value="123456789012">
</div>
<div class="row g-2 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Width:</label>
<input type="range" class="form-range" id="bcWidth" min="1" max="4" value="2" oninput="document.getElementById('bcWidthVal').textContent=this.value">
<small>Width: <span id="bcWidthVal">2</span></small></div>
<div class="col-md-6"><label class="form-label fw-bold">Height (px):</label>
<input type="range" class="form-range" id="bcHeight" min="40" max="200" value="100" oninput="document.getElementById('bcHeightVal').textContent=this.value">
<small>Height: <span id="bcHeightVal">100</span>px</small></div>
</div>
<button class="btn cartoon-btn w-100" onclick="genBarcode()"><i class="bi bi-magic me-2"></i>Generate Barcode</button>
<div id="bcResult" class="result-box text-center" style="display:none;">
<svg id="bcSVG"></svg>
<div class="mt-3"><button class="btn btn-success cartoon-btn" onclick="downloadBC()"><i class="bi bi-download me-2"></i>Download PNG</button></div>
</div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/jsbarcode@3.11.6/dist/JsBarcode.all.min.js"></script>
<script>
function genBarcode(){
  var t=document.getElementById('bcText').value.trim();
  if(!t){alert('Content enter karo.');return;}
  try{
    JsBarcode('#bcSVG',t,{
      format:document.getElementById('bcType').value,
      width:parseInt(document.getElementById('bcWidth').value),
      height:parseInt(document.getElementById('bcHeight').value),
      displayValue:true,fontSize:16,margin:10
    });
    document.getElementById('bcResult').style.display='';
  }catch(e){alert('Invalid content for selected barcode type.');}
}
function downloadBC(){
  var svg=document.getElementById('bcSVG');
  var xml=new XMLSerializer().serializeToString(svg);
  var img=new Image();
  img.onload=function(){
    var c=document.createElement('canvas');c.width=img.width;c.height=img.height;
    var ctx=c.getContext('2d');ctx.fillStyle='#fff';ctx.fillRect(0,0,c.width,c.height);ctx.drawImage(img,0,0);
    var a=document.createElement('a');a.download='barcode.png';a.href=c.toDataURL();a.click();
  };
  img.src='data:image/svg+xml;base64,'+btoa(unescape(encodeURIComponent(xml)));
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
