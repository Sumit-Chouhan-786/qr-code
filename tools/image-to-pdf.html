<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image to PDF | OnlineQrs</title>
<meta name="description" content="Multiple images ko ek PDF mein convert karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-file-pdf" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Image to PDF</h1>
<p class="mb-0">Multiple images ko ek PDF mein convert karo</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Images select karo (multiple):</label>
<input type="file" class="form-control cartoon-input" id="pdfImgs" accept="image/*" multiple onchange="loadPDFImgs(this)"></div>
<div id="imgPreview" class="row g-2 mb-3"></div>
<div class="mb-3"><label class="form-label fw-bold">Page Size:</label>
<select class="form-select cartoon-input" id="pgSize"><option value="a4">A4</option><option value="letter">Letter</option><option value="fit">Fit to Image</option></select></div>
<button class="btn cartoon-btn w-100" onclick="genPDF()"><i class="bi bi-file-pdf me-2"></i>Generate PDF</button>
<div id="pdfMsg" class="alert alert-success mt-3" style="display:none;"><i class="bi bi-check-circle-fill me-2"></i>PDF ready! Download ho raha hai...</div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script>
var imgFiles=[];
function loadPDFImgs(inp){
  imgFiles=Array.from(inp.files);
  var prev=document.getElementById('imgPreview');prev.innerHTML='';
  imgFiles.forEach(function(f){
    var col=document.createElement('div');col.className='col-4 col-md-3';
    var url=URL.createObjectURL(f);
    col.innerHTML='<img src="'+url+'" style="width:100%;border-radius:10px;border:2px solid var(--primary);" alt="">';
    prev.appendChild(col);
  });
}
function genPDF(){
  if(!imgFiles.length){alert('Images select karo.');return;}
  var pg=document.getElementById('pgSize').value;
  var promises=imgFiles.map(function(f){
    return new Promise(function(res){
      var r=new FileReader();r.onload=function(e){res(e.target.result);};r.readAsDataURL(f);
    });
  });
  Promise.all(promises).then(function(urls){
    var jsPDF=window.jspdf.jsPDF;
    var pdf=null;
    var tasks=urls.map(function(url,i){
      return new Promise(function(res){
        var img=new Image();img.onload=function(){
          var iw=img.width,ih=img.height;
          var pw,ph;
          if(pg==='a4'){pw=210;ph=297;}
          else if(pg==='letter'){pw=215.9;ph=279.4;}
          else{pw=iw*0.264583;ph=ih*0.264583;}
          if(!pdf)pdf=new jsPDF({unit:'mm',format:[pw,ph]});
          else pdf.addPage([pw,ph]);
          var ratio=Math.min(pw/iw,ph/ih)*0.264583;
          var dw=iw*ratio*3.7795275591,dh=ih*ratio*3.7795275591;
          var x=(pw-iw*ratio*3.7795275591)/2,y=(ph-ih*ratio*3.7795275591)/2;
          pdf.addImage(url,'JPEG',x,y,iw*ratio,ih*ratio);
          res();
        };img.src=url;
      });
    });
    Promise.all(tasks).then(function(){
      pdf.save('OnlineQrs-images.pdf');
      document.getElementById('pdfMsg').style.display='';
    });
  });
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
