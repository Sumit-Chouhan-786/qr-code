<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Certificate Maker | OnlineQrs</title>
<meta name="description" content="Participation ya achievement certificates banao — teachers ke liye">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-patch-check" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Certificate Maker</h1>
<p class="mb-0">Participation ya achievement certificates banao — teachers ke liye</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Certificate Type:</label>
<select class="form-select cartoon-input" id="ct"><option>Certificate of Participation</option><option>Certificate of Achievement</option><option>Certificate of Completion</option><option>Certificate of Excellence</option></select></div>
<div class="col-md-6"><label class="form-label fw-bold">Recipient Name *</label><input type="text" class="form-control cartoon-input" id="rn" placeholder="Rahul Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Event / Course *</label><input type="text" class="form-control cartoon-input" id="ev" placeholder="Annual Science Exhibition 2024"></div>
<div class="col-md-6"><label class="form-label fw-bold">Issued By *</label><input type="text" class="form-control cartoon-input" id="ib" placeholder="Principal / Organization"></div>
<div class="col-md-6"><label class="form-label fw-bold">Date</label><input type="date" class="form-control cartoon-input" id="dt"></div>
<div class="col-md-6"><label class="form-label fw-bold">Theme Color</label><input type="color" class="form-control cartoon-input" id="col" value="#d35400" style="height:46px;"></div>
</div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-magic me-2"></i>Generate Certificate</button>
<div id="res" class="mt-3 text-center" style="display:none;">
<canvas id="cv" style="max-width:100%;border-radius:12px;box-shadow:0 8px 24px rgba(0,0,0,.2);"></canvas>
<div class="mt-3"><button class="btn btn-success cartoon-btn" onclick="dl()"><i class="bi bi-download me-2"></i>Download (PNG)</button></div>
</div>
</div></div></div>
<script>
document.getElementById('dt').valueAsDate=new Date();
function gen(){
  var rn=document.getElementById('rn').value.trim(),ev=document.getElementById('ev').value.trim(),ib=document.getElementById('ib').value.trim();
  if(!rn||!ev||!ib){alert('Required fields fill karo.');return;}
  var ct=document.getElementById('ct').value,color=document.getElementById('col').value;
  var dt=document.getElementById('dt').value,dtS=dt?new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}):new Date().toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'});
  var W=900,H=630,c=document.getElementById('cv');c.width=W;c.height=H;var ctx=c.getContext('2d');
  ctx.fillStyle='#fffdf5';ctx.fillRect(0,0,W,H);
  ctx.strokeStyle=color;ctx.lineWidth=12;ctx.strokeRect(20,20,W-40,H-40);
  ctx.strokeStyle=color+'88';ctx.lineWidth=4;ctx.strokeRect(34,34,W-68,H-68);
  ctx.fillStyle=color;ctx.fillRect(0,0,W,80);ctx.fillRect(0,H-80,W,80);
  ctx.fillStyle='#fff';ctx.font='bold 26px serif';ctx.textAlign='center';ctx.fillText('CERTIFICATE',W/2,50);
  ctx.fillStyle='#555';ctx.font='18px serif';ctx.textAlign='center';ctx.fillText('This is to certify that',W/2,160);
  ctx.fillStyle=color;ctx.font='bold 52px serif';ctx.fillText(rn,W/2,240);
  ctx.fillStyle='#333';ctx.font='16px sans-serif';ctx.fillText('has been awarded the',W/2,285);
  ctx.fillStyle='#222';ctx.font='bold 22px serif';ctx.fillText(ct,W/2,320);
  ctx.font='16px sans-serif';ctx.fillStyle='#555';ctx.fillText('for',W/2,355);
  ctx.fillStyle=color;ctx.font='bold 22px serif';ctx.fillText(ev.length>45?ev.substring(0,45)+'...':ev,W/2,390);
  ctx.fillStyle='#999';ctx.font='14px sans-serif';ctx.fillText(dtS,W/2,460);
  ctx.strokeStyle=color;ctx.lineWidth=1.5;ctx.beginPath();ctx.moveTo(W/2-100,505);ctx.lineTo(W/2+100,505);ctx.stroke();
  ctx.fillStyle='#333';ctx.font='bold 16px serif';ctx.fillText(ib,W/2,525);
  ctx.font='12px sans-serif';ctx.fillStyle='#999';ctx.fillText('Authorized Signatory',W/2,545);
  ctx.fillStyle='#ddd';ctx.font='10px sans-serif';ctx.fillText('OnlineQrs.com',W/2,H-25);
  document.getElementById('res').style.display='';
}
function dl(){var a=document.createElement('a');a.download='certificate.png';a.href=document.getElementById('cv').toDataURL();a.click();}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
