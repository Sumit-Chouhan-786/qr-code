<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Cheque Writer Tool | OnlineQrs</title>
<meta name="description" content="Amount ko words mein likho — cheque writing ka sahi format">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-check-square" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Cheque Writer Tool</h1>
<p class="mb-0">Amount ko words mein likho — cheque writing ka sahi format</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Amount (Rs.):</label>
<input type="number" class="form-control cartoon-input" id="amt" placeholder="15750.50" step="0.01" oninput="wc()"></div>
<div class="mb-3"><label class="form-label fw-bold">Payee Name:</label>
<input type="text" class="form-control cartoon-input" id="pay" placeholder="Rahul Sharma" oninput="wc()"></div>
<div class="mb-3"><label class="form-label fw-bold">Date:</label>
<input type="date" class="form-control cartoon-input" id="dt" oninput="wc()"></div>
<div id="res" class="result-box" style="display:none;">
<div class="p-3" style="background:#fffdf0;border:2px solid #d35400;border-radius:12px;font-family:Georgia,serif;">
<div class="d-flex justify-content-between mb-2">
<span class="fw-bold">Pay to: <span id="rp" style="text-decoration:underline;"></span></span>
<span class="fw-bold">Date: <span id="rd"></span></span>
</div>
<div class="mb-2"><strong>Rs. <span id="rn" style="font-size:1.2rem;"></span></strong></div>
<div class="p-2 mb-2" style="background:#fff;border:1px solid #ccc;border-radius:8px;min-height:40px;">
<span id="rw" class="fw-bold" style="font-size:1rem;color:#333;"></span><span class="text-muted"> Only</span>
</div>
</div>
<button class="btn btn-primary cartoon-btn mt-2" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('rw').textContent+' Only')"><i class="bi bi-copy me-1"></i>Copy Amount in Words</button>
</div>
</div></div></div>
<script>
document.getElementById('dt').valueAsDate=new Date();
function nw(n){
  if(!n)return'Zero';
  var a=['','One','Two','Three','Four','Five','Six','Seven','Eight','Nine','Ten','Eleven','Twelve','Thirteen','Fourteen','Fifteen','Sixteen','Seventeen','Eighteen','Nineteen'];
  var b=['','','Twenty','Thirty','Forty','Fifty','Sixty','Seventy','Eighty','Ninety'];
  function h(x){if(!x)return'';if(x<20)return a[x]+' ';if(x<100)return b[Math.floor(x/10)]+(x%10?' '+a[x%10]+' ':' ');return a[Math.floor(x/100)]+' Hundred '+(x%100?h(x%100):'');}
  var r='',cr=Math.floor(n/10000000);n%=10000000;var lac=Math.floor(n/100000);n%=100000;var th=Math.floor(n/1000);n%=1000;
  if(cr)r+=h(cr)+'Crore ';if(lac)r+=h(lac)+'Lakh ';if(th)r+=h(th)+'Thousand ';return(r+h(n)).trim();
}
function wc(){
  var amt=parseFloat(document.getElementById('amt').value);
  if(!amt||amt<=0){document.getElementById('res').style.display='none';return;}
  var rs=Math.floor(amt),ps=Math.round((amt-rs)*100);
  var words=nw(rs)+' Rupees'+(ps?' and '+nw(ps)+' Paise':'');
  document.getElementById('rn').textContent=amt.toLocaleString('en-IN',{minimumFractionDigits:2});
  document.getElementById('rw').textContent=words;
  document.getElementById('rp').textContent=document.getElementById('pay').value||'___________';
  var dt=document.getElementById('dt').value;
  document.getElementById('rd').textContent=dt?new Date(dt).toLocaleDateString('en-IN'):'___________';
  document.getElementById('res').style.display='';
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
