<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Timetable / Schedule Maker | OnlineQrs</title>
<meta name="description" content="Weekly class timetable banao — editable cells ke saath">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-table" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Timetable / Schedule Maker</h1>
<p class="mb-0">Weekly class timetable banao — editable cells ke saath</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-10">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Title *</label><input type="text" class="form-control cartoon-input" id="tt" placeholder="Class 10-A Timetable"></div>
<div class="col-md-3"><label class="form-label fw-bold">Periods/Day</label><input type="number" class="form-control cartoon-input" id="per" value="7" min="1" max="10" onchange="build()"></div>
<div class="col-md-3"><label class="form-label fw-bold">Color</label><input type="color" class="form-control cartoon-input" id="clr" value="#d35400" style="height:46px;"></div>
</div>
<div class="mb-3"><label class="form-label fw-bold">Period Times (comma separated)</label>
<input type="text" class="form-control cartoon-input" id="times" value="9:00,10:00,11:00,12:00,1:00,2:00,3:00"></div>
<div class="table-responsive mb-3"><table class="table table-bordered table-sm" id="ttbl" style="font-size:.85rem;"></table></div>
<div class="d-flex gap-2">
<button class="btn cartoon-btn btn-sm" onclick="build()"><i class="bi bi-arrow-clockwise me-1"></i>Rebuild</button>
<button class="btn btn-success cartoon-btn" onclick="genTT()"><i class="bi bi-file-pdf me-1"></i>Download PDF</button>
</div>
</div></div></div>
<script>
var days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday'];
function build(){
  var p=parseInt(document.getElementById('per').value)||7;
  var times=document.getElementById('times').value.split(',');
  var tbl=document.getElementById('ttbl');tbl.innerHTML='';
  var head=document.createElement('thead'),hr=document.createElement('tr');
  var th0=document.createElement('th');th0.textContent='Day';th0.style.background=document.getElementById('clr').value;th0.style.color='#fff';hr.appendChild(th0);
  for(var i=0;i<p;i++){var th=document.createElement('th');th.textContent='P'+(i+1)+(times[i]?' ('+times[i]+')':'');th.style.background=document.getElementById('clr').value;th.style.color='#fff';hr.appendChild(th);}
  head.appendChild(hr);tbl.appendChild(head);
  var body=document.createElement('tbody');
  days.forEach(function(d){
    var tr=document.createElement('tr');
    var td0=document.createElement('td');td0.textContent=d;td0.style.fontWeight='bold';td0.style.background='#fff8f0';tr.appendChild(td0);
    for(var i=0;i<p;i++){var td=document.createElement('td');td.contentEditable='true';td.style.minWidth='70px';td.style.cursor='text';tr.appendChild(td);}
    body.appendChild(tr);
  });
  tbl.appendChild(body);
}
function genTT(){
  var title=document.getElementById('tt').value||'Timetable';
  var p=parseInt(document.getElementById('per').value)||7;
  var times=document.getElementById('times').value.split(',');
  var clr=document.getElementById('clr').value;
  var head=['Day'];for(var i=0;i<p;i++)head.push('P'+(i+1)+(times[i]?'
'+times[i]:''));
  var rows=[];
  document.querySelectorAll('#ttbl tbody tr').forEach(function(tr,i){
    var row=[days[i]];tr.querySelectorAll('td:not(:first-child)').forEach(function(td){row.push(td.textContent||'');});rows.push(row);
  });
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF('l');
  pdf.setFontSize(14);pdf.setFont(undefined,'bold');
  var rgb=[parseInt(clr.slice(1,3),16),parseInt(clr.slice(3,5),16),parseInt(clr.slice(5,7),16)];
  pdf.setTextColor(rgb[0],rgb[1],rgb[2]);pdf.text(title,148,15,{align:'center'});
  var tw=270/(p+1);
  var hY=22;
  pdf.setFillColor(rgb[0],rgb[1],rgb[2]);pdf.rect(14,hY,270,8,'F');
  pdf.setTextColor(255);pdf.setFontSize(8);pdf.setFont(undefined,'bold');
  head.forEach(function(h,i){pdf.text(h.split('
')[0],14+i*tw+2,hY+5.5);});
  var y=hY+12;pdf.setFont(undefined,'normal');pdf.setTextColor(0);
  rows.forEach(function(row,ri){
    if(ri%2===0){pdf.setFillColor(255,248,240);pdf.rect(14,y-5,270,7,'F');}
    row.forEach(function(cell,ci){pdf.setFontSize(8);pdf.text(String(cell).substring(0,12),14+ci*tw+2,y);});y+=8;
  });
  pdf.setFontSize(7);pdf.setTextColor(150);pdf.text('Generated by OnlineQrs.com',148,200,{align:'center'});
  pdf.save(title.replace(/ /g,'-')+'.pdf');
}
build();
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
