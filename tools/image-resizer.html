<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Image Resizer | OnlineQrs</title>
<meta name="description" content="Image ko custom size mein resize karo — instantly">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-aspect-ratio" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Image Resizer</h1>
<p class="mb-0">Image ko custom size mein resize karo — instantly</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Image upload karo:</label>
<input type="file" class="form-control cartoon-input" id="rImg" accept="image/*" onchange="loadRImg(this)"></div>
<div class="row g-2 mb-3">
<div class="col-6"><label class="form-label fw-bold">Width (px):</label><input type="number" class="form-control cartoon-input" id="rW" placeholder="800"></div>
<div class="col-6"><label class="form-label fw-bold">Height (px):</label><input type="number" class="form-control cartoon-input" id="rH" placeholder="600"></div>
</div>
<div class="form-check mb-3"><input type="checkbox" class="form-check-input" id="keepRatio" checked><label class="form-check-label fw-bold" for="keepRatio">Aspect ratio maintain karo</label></div>
<button class="btn cartoon-btn w-100" onclick="resizeImg()"><i class="bi bi-arrows-fullscreen me-2"></i>Resize Image</button>
<div id="rResult" class="result-box text-center" style="display:none;">
<canvas id="rCanvas" style="max-width:100%;border-radius:10px;"></canvas>
<div class="mt-3"><button class="btn btn-success cartoon-btn" onclick="dlR()"><i class="bi bi-download me-2"></i>Download</button></div>
</div>
</div></div></div>
<script>
var origImg=null,origW=0,origH=0;
function loadRImg(inp){
  var f=inp.files[0];if(!f)return;
  var r=new FileReader();r.onload=function(e){
    origImg=new Image();origImg.onload=function(){
      origW=origImg.width;origH=origImg.height;
      document.getElementById('rW').value=origW;document.getElementById('rH').value=origH;
    };origImg.src=e.target.result;
  };r.readAsDataURL(f);
}
document.getElementById('rW').addEventListener('input',function(){
  if(document.getElementById('keepRatio').checked&&origW&&origH){
    document.getElementById('rH').value=Math.round(this.value*origH/origW);
  }
});
function resizeImg(){
  if(!origImg){alert('Image upload karo.');return;}
  var w=parseInt(document.getElementById('rW').value)||origW;
  var h=parseInt(document.getElementById('rH').value)||origH;
  var c=document.getElementById('rCanvas');c.width=w;c.height=h;
  c.getContext('2d').drawImage(origImg,0,0,w,h);
  document.getElementById('rResult').style.display='';
}
function dlR(){var c=document.getElementById('rCanvas');var a=document.createElement('a');a.download='resized.png';a.href=c.toDataURL();a.click();}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
