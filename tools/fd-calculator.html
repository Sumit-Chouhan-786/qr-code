<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>FD Calculator | OnlineQrs</title>
<meta name="description" content="Fixed Deposit maturity aur interest calculate karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-bank" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">FD Calculator</h1>
<p class="mb-0">Fixed Deposit maturity aur interest calculate karo</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Principal (Rs.):</label><input type="number" class="form-control cartoon-input" id="p" placeholder="100000" oninput="calc()"></div>
<div class="mb-3"><label class="form-label fw-bold">Interest Rate (% p.a.):</label><input type="number" class="form-control cartoon-input" id="r" placeholder="7.5" step="0.1" oninput="calc()"></div>
<div class="row g-2 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Tenure:</label><input type="number" class="form-control cartoon-input" id="t" placeholder="2" oninput="calc()"></div>
<div class="col-md-6"><label class="form-label fw-bold">Unit:</label>
<select class="form-select cartoon-input" id="u" onchange="calc()"><option value="y">Years</option><option value="m">Months</option><option value="d">Days</option></select></div>
</div>
<div class="mb-3"><label class="form-label fw-bold">Compounding:</label>
<select class="form-select cartoon-input" id="c" onchange="calc()">
<option value="4">Quarterly</option><option value="12">Monthly</option><option value="2">Half-Yearly</option><option value="1">Yearly</option>
</select></div>
<div id="res" class="result-box" style="display:none;">
<div class="row g-3 text-center">
<div class="col-4"><div class="cartoon-card p-2"><small>Principal</small><div class="h5 mb-0" style="color:var(--primary);" id="rp">Rs.0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Interest</small><div class="h5 mb-0" style="color:var(--success);" id="ri">Rs.0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Maturity</small><div class="h5 mb-0" style="color:var(--primary);" id="rm">Rs.0</div></div></div>
</div></div>
</div></div></div>
<script>
function calc(){
  var P=parseFloat(document.getElementById('p').value)||0;
  var r=parseFloat(document.getElementById('r').value)||0;
  var t=parseFloat(document.getElementById('t').value)||0;
  var u=document.getElementById('u').value;var n=parseInt(document.getElementById('c').value);
  var yrs=u==='y'?t:u==='m'?t/12:t/365;
  var mat=P*Math.pow(1+(r/100)/n,n*yrs);
  document.getElementById('rp').textContent='Rs.'+Math.round(P).toLocaleString('en-IN');
  document.getElementById('ri').textContent='Rs.'+Math.round(mat-P).toLocaleString('en-IN');
  document.getElementById('rm').textContent='Rs.'+Math.round(mat).toLocaleString('en-IN');
  document.getElementById('res').style.display='';
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
