<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Salary Slip Generator | OnlineQrs</title>
<meta name="description" content="Professional salary slip PDF banao — freelancers aur HR ke liye">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-file-person" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Salary Slip Generator</h1>
<p class="mb-0">Professional salary slip PDF banao — freelancers aur HR ke liye</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-9">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Company Name *</label><input type="text" class="form-control cartoon-input" id="co" placeholder="ABC Pvt Ltd"></div>
<div class="col-md-6"><label class="form-label fw-bold">Employee Name *</label><input type="text" class="form-control cartoon-input" id="en" placeholder="Rahul Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Designation</label><input type="text" class="form-control cartoon-input" id="des" placeholder="Software Developer"></div>
<div class="col-md-6"><label class="form-label fw-bold">Employee ID</label><input type="text" class="form-control cartoon-input" id="eid" placeholder="EMP-001"></div>
<div class="col-md-6"><label class="form-label fw-bold">Department</label><input type="text" class="form-control cartoon-input" id="dept" placeholder="Engineering"></div>
<div class="col-md-6"><label class="form-label fw-bold">Salary Month</label><input type="month" class="form-control cartoon-input" id="mon"></div>
</div>
<div class="row g-2 mb-3">
<div class="col-md-4"><label class="form-label fw-bold">Basic (Rs.)</label><input type="number" class="form-control cartoon-input" id="b" placeholder="30000" oninput="cs()"></div>
<div class="col-md-4"><label class="form-label fw-bold">HRA (Rs.)</label><input type="number" class="form-control cartoon-input" id="h" placeholder="12000" oninput="cs()"></div>
<div class="col-md-4"><label class="form-label fw-bold">Special Allowance (Rs.)</label><input type="number" class="form-control cartoon-input" id="sa" placeholder="8000" oninput="cs()"></div>
<div class="col-md-4"><label class="form-label fw-bold">PF (Rs.)</label><input type="number" class="form-control cartoon-input" id="pf" placeholder="1800" oninput="cs()"></div>
<div class="col-md-4"><label class="form-label fw-bold">TDS (Rs.)</label><input type="number" class="form-control cartoon-input" id="tds" placeholder="2000" oninput="cs()"></div>
<div class="col-md-4"><label class="form-label fw-bold">Other Deductions</label><input type="number" class="form-control cartoon-input" id="od" placeholder="0" oninput="cs()"></div>
</div>
<div id="sum" class="row g-3 text-center mb-3" style="display:none;">
<div class="col-4"><div class="cartoon-card p-2"><small>Gross</small><div class="h5 mb-0" style="color:var(--success);" id="sg">Rs.0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Deductions</small><div class="h5 mb-0" style="color:var(--danger);" id="sd">Rs.0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Net Pay</small><div class="h5 mb-0" style="color:var(--primary);" id="sn">Rs.0</div></div></div>
</div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-file-pdf me-2"></i>Generate Salary Slip PDF</button>
</div></div></div>
<script>
var now=new Date();document.getElementById('mon').value=now.getFullYear()+'-'+String(now.getMonth()+1).padStart(2,'0');
function cs(){
  var b=+document.getElementById('b').value||0,h=+document.getElementById('h').value||0,sa=+document.getElementById('sa').value||0;
  var pf=+document.getElementById('pf').value||0,tds=+document.getElementById('tds').value||0,od=+document.getElementById('od').value||0;
  var g=b+h+sa,d=pf+tds+od;
  document.getElementById('sg').textContent='Rs.'+g.toLocaleString('en-IN');
  document.getElementById('sd').textContent='Rs.'+d.toLocaleString('en-IN');
  document.getElementById('sn').textContent='Rs.'+(g-d).toLocaleString('en-IN');
  document.getElementById('sum').style.display='';
}
function gen(){
  var co=document.getElementById('co').value.trim(),en=document.getElementById('en').value.trim();
  if(!co||!en){alert('Company aur Employee name required');return;}
  var b=+document.getElementById('b').value||0,h=+document.getElementById('h').value||0,sa=+document.getElementById('sa').value||0;
  var pf=+document.getElementById('pf').value||0,tds=+document.getElementById('tds').value||0,od=+document.getElementById('od').value||0;
  var gross=b+h+sa,ded=pf+tds+od,net=gross-ded;
  var mon=document.getElementById('mon').value;
  var mStr=mon?new Date(mon+'-01').toLocaleString('default',{month:'long',year:'numeric'}):new Date().toLocaleString('default',{month:'long',year:'numeric'});
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF();
  pdf.setFillColor(211,84,0);pdf.rect(0,0,210,22,'F');
  pdf.setTextColor(255);pdf.setFontSize(14);pdf.setFont(undefined,'bold');
  pdf.text(co,105,11,{align:'center'});
  pdf.setFontSize(10);pdf.text('SALARY SLIP — '+mStr.toUpperCase(),105,19,{align:'center'});
  pdf.setTextColor(0);pdf.setFontSize(10);pdf.setFont(undefined,'normal');
  var y=32;
  [['Employee',en,'Designation',document.getElementById('des').value],['Emp ID',document.getElementById('eid').value,'Department',document.getElementById('dept').value]].forEach(function(r){
    pdf.setFont(undefined,'bold');pdf.text(r[0]+':',14,y);pdf.setFont(undefined,'normal');pdf.text(r[1],45,y);
    pdf.setFont(undefined,'bold');pdf.text(r[2]+':',115,y);pdf.setFont(undefined,'normal');pdf.text(r[3],148,y);y+=8;
  });
  y+=4;pdf.line(14,y,196,y);y+=8;
  pdf.setFillColor(240,240,240);pdf.rect(14,y-5,91,8,'F');pdf.rect(105,y-5,91,8,'F');
  pdf.setFont(undefined,'bold');pdf.text('EARNINGS',60,y,{align:'center'});pdf.text('DEDUCTIONS',150,y,{align:'center'});y+=8;
  [['Basic',b],['HRA',h],['Special Allowance',sa]].forEach(function(e,i){
    var ds=[['Provident Fund',pf],['TDS',tds],['Other Deductions',od]];
    pdf.setFont(undefined,'normal');pdf.text(e[0],16,y);pdf.text('Rs.'+e[1].toLocaleString('en-IN'),90,y,{align:'right'});
    pdf.text(ds[i][0],107,y);pdf.text('Rs.'+ds[i][1].toLocaleString('en-IN'),196,y,{align:'right'});y+=8;
  });
  y+=4;pdf.line(14,y,196,y);y+=8;
  pdf.setFont(undefined,'bold');
  pdf.setFillColor(220,240,220);pdf.rect(14,y-5,91,10,'F');pdf.text('Gross Pay',16,y);pdf.text('Rs.'+gross.toLocaleString('en-IN'),90,y,{align:'right'});
  pdf.setFillColor(240,220,220);pdf.rect(105,y-5,91,10,'F');pdf.text('Total Deductions',107,y);pdf.text('Rs.'+ded.toLocaleString('en-IN'),196,y,{align:'right'});
  y+=15;pdf.setFillColor(211,84,0);pdf.rect(14,y-7,182,12,'F');pdf.setTextColor(255);pdf.setFontSize(12);
  pdf.text('NET PAY: Rs.'+net.toLocaleString('en-IN'),105,y,{align:'center'});
  y+=20;pdf.setTextColor(0);pdf.setFontSize(9);pdf.setFont(undefined,'normal');
  pdf.text('This is a computer generated salary slip.',14,y);
  pdf.text('Authorized Signature: _________________',120,y+15);
  pdf.setFontSize(8);pdf.setTextColor(150);pdf.text('Generated by OnlineQrs.com',105,285,{align:'center'});
  pdf.save('salary-slip-'+en.replace(/ /g,'-')+'-'+mStr+'.pdf');
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
