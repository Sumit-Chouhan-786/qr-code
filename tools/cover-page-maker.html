<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Assignment Cover Page Maker | OnlineQrs</title>
<meta name="description" content="College assignment ka professional cover page PDF banao">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-journal-richtext" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Assignment Cover Page Maker</h1>
<p class="mb-0">College assignment ka professional cover page PDF banao</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">College / University *</label><input type="text" class="form-control cartoon-input" id="col" placeholder="Mumbai University"></div>
<div class="col-md-6"><label class="form-label fw-bold">Department</label><input type="text" class="form-control cartoon-input" id="dept" placeholder="Computer Science"></div>
<div class="col-12"><label class="form-label fw-bold">Subject / Assignment Title *</label><input type="text" class="form-control cartoon-input" id="sub" placeholder="Data Structures — Assignment 1"></div>
<div class="col-md-6"><label class="form-label fw-bold">Student Name *</label><input type="text" class="form-control cartoon-input" id="sn" placeholder="Rahul Sharma"></div>
<div class="col-md-6"><label class="form-label fw-bold">Roll Number</label><input type="text" class="form-control cartoon-input" id="roll" placeholder="2021CS001"></div>
<div class="col-md-6"><label class="form-label fw-bold">Class / Course</label><input type="text" class="form-control cartoon-input" id="cls" placeholder="B.Sc. CS — 3rd Year"></div>
<div class="col-md-6"><label class="form-label fw-bold">Submitted To</label><input type="text" class="form-control cartoon-input" id="tea" placeholder="Prof. Priya Singh"></div>
<div class="col-md-6"><label class="form-label fw-bold">Submission Date</label><input type="date" class="form-control cartoon-input" id="dt"></div>
<div class="col-md-6"><label class="form-label fw-bold">Academic Year</label><input type="text" class="form-control cartoon-input" id="yr" placeholder="2024-25"></div>
</div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-file-pdf me-2"></i>Generate Cover Page PDF</button>
</div></div></div>
<script>
document.getElementById('dt').valueAsDate=new Date();
function gen(){
  var col=document.getElementById('col').value.trim(),sub=document.getElementById('sub').value.trim(),sn=document.getElementById('sn').value.trim();
  if(!col||!sub||!sn){alert('Required fields fill karo.');return;}
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF();
  pdf.setFillColor(211,84,0);pdf.rect(0,0,210,8,'F');pdf.rect(0,289,210,8,'F');
  pdf.setDrawColor(211,84,0);pdf.setLineWidth(0.5);pdf.rect(15,15,180,267);
  pdf.setFontSize(15);pdf.setFont(undefined,'bold');pdf.setTextColor(211,84,0);pdf.text(col.toUpperCase(),105,38,{align:'center'});
  var dept=document.getElementById('dept').value.trim();
  if(dept){pdf.setFontSize(11);pdf.setFont(undefined,'normal');pdf.setTextColor(0);pdf.text(dept,105,50,{align:'center'});}
  pdf.line(20,58,190,58);
  pdf.setFontSize(13);pdf.setFont(undefined,'bold');pdf.setTextColor(0);
  var subL=pdf.splitTextToSize(sub,160);pdf.text(subL,105,85,{align:'center'});
  pdf.setFontSize(10);pdf.setFont(undefined,'normal');var y=128;
  var info=[['Submitted By',sn],['Roll No',document.getElementById('roll').value],['Class',document.getElementById('cls').value],['Submitted To',document.getElementById('tea').value],['Academic Year',document.getElementById('yr').value]];
  info.forEach(function(r){if(r[1]){pdf.setFont(undefined,'bold');pdf.text(r[0]+':',40,y);pdf.setFont(undefined,'normal');pdf.text(r[1],90,y);y+=11;}});
  var dt=document.getElementById('dt').value;
  if(dt){pdf.setFont(undefined,'bold');pdf.text('Date:',40,y);pdf.setFont(undefined,'normal');pdf.text(new Date(dt).toLocaleDateString('en-IN',{day:'numeric',month:'long',year:'numeric'}),90,y);}
  pdf.setFontSize(8);pdf.setTextColor(150);pdf.text('Generated by OnlineQrs.com',105,285,{align:'center'});
  pdf.save('cover-page.pdf');
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
