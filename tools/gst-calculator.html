<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Calculator India | OnlineQrs</title>
<meta name="description" content="Amount mein GST add ya remove karo — all slabs supported">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-percent" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">GST Calculator India</h1>
<p class="mb-0">Amount mein GST add ya remove karo — all slabs supported</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Amount (₹):</label>
<input type="number" class="form-control cartoon-input" id="gstAmt" placeholder="1000" min="0" oninput="calcGST()"></div>
<div class="mb-3"><label class="form-label fw-bold">GST Rate:</label>
<div class="d-flex flex-wrap gap-2">
<button class="btn cartoon-btn btn-sm gst-rate active" onclick="setRate(5,this)">5%</button>
<button class="btn cartoon-btn btn-sm gst-rate" onclick="setRate(12,this)">12%</button>
<button class="btn cartoon-btn btn-sm gst-rate" onclick="setRate(18,this)">18%</button>
<button class="btn cartoon-btn btn-sm gst-rate" onclick="setRate(28,this)">28%</button>
<button class="btn cartoon-btn btn-sm gst-rate" onclick="setRate(0,this)">Custom</button>
</div>
<input type="number" class="form-control cartoon-input mt-2" id="customRate" value="5" min="0" max="100" oninput="calcGST()">
</div>
<div class="mb-3"><label class="form-label fw-bold">Calculation Type:</label>
<div class="d-flex gap-3">
<div class="form-check"><input type="radio" class="form-check-input" name="gstType" id="gstAdd" value="add" checked onchange="calcGST()"><label class="form-check-label fw-bold" for="gstAdd">Add GST (Exclusive)</label></div>
<div class="form-check"><input type="radio" class="form-check-input" name="gstType" id="gstRemove" value="remove" onchange="calcGST()"><label class="form-check-label fw-bold" for="gstRemove">Remove GST (Inclusive)</label></div>
</div>
</div>
<div id="gstResult" class="result-box" style="display:none;">
<div class="row g-3 text-center">
<div class="col-4"><div class="cartoon-card p-2"><small>Base Amount</small><div class="h5 mb-0" style="color:var(--primary);" id="gstBase">₹0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>GST Amount</small><div class="h5 mb-0" style="color:var(--success);" id="gstTax">₹0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Total</small><div class="h5 mb-0" style="color:var(--primary);" id="gstTotal">₹0</div></div></div>
</div>
<div class="mt-3 p-2 bg-light rounded"><small id="gstBreak" style="font-family:monospace;"></small></div>
</div>
</div></div></div>
<script>
var gstRate=5;
function setRate(r,btn){
  gstRate=r;
  document.getElementById('customRate').value=r;
  document.querySelectorAll('.gst-rate').forEach(function(b){b.classList.remove('active');b.style.opacity='0.7';});
  btn.classList.add('active');btn.style.opacity='1';
  calcGST();
}
function calcGST(){
  var amt=parseFloat(document.getElementById('gstAmt').value)||0;
  var rate=parseFloat(document.getElementById('customRate').value)||0;
  gstRate=rate;
  var type=document.querySelector('input[name="gstType"]:checked').value;
  var base,tax,total;
  if(type==='add'){base=amt;tax=amt*rate/100;total=amt+tax;}
  else{total=amt;base=amt*100/(100+rate);tax=amt-base;}
  document.getElementById('gstBase').textContent='₹'+base.toFixed(2);
  document.getElementById('gstTax').textContent='₹'+tax.toFixed(2);
  document.getElementById('gstTotal').textContent='₹'+total.toFixed(2);
  document.getElementById('gstBreak').textContent='Base: ₹'+base.toFixed(2)+' + GST @'+rate+'% (CGST '+rate/2+'% + SGST '+rate/2+'%): ₹'+tax.toFixed(2)+' = Total: ₹'+total.toFixed(2);
  document.getElementById('gstResult').style.display='';
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
