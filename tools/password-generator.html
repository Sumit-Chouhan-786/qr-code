<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Password Generator | OnlineQrs</title>
<meta name="description" content="Strong secure password generate karo instantly">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-shield-lock" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Password Generator</h1>
<p class="mb-0">Strong secure password generate karo instantly</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Length: <span id="pgLenVal">16</span></label>
<input type="range" class="form-range" id="pgLen" min="6" max="64" value="16" oninput="document.getElementById('pgLenVal').textContent=this.value;genPwd()"></div>
<div class="row g-2 mb-3">
<div class="col-6"><div class="form-check"><input class="form-check-input" type="checkbox" id="pgUpper" checked onchange="genPwd()"><label class="form-check-label fw-bold" for="pgUpper">Uppercase (A-Z)</label></div></div>
<div class="col-6"><div class="form-check"><input class="form-check-input" type="checkbox" id="pgLower" checked onchange="genPwd()"><label class="form-check-label fw-bold" for="pgLower">Lowercase (a-z)</label></div></div>
<div class="col-6"><div class="form-check"><input class="form-check-input" type="checkbox" id="pgNums" checked onchange="genPwd()"><label class="form-check-label fw-bold" for="pgNums">Numbers (0-9)</label></div></div>
<div class="col-6"><div class="form-check"><input class="form-check-input" type="checkbox" id="pgSym" onchange="genPwd()"><label class="form-check-label fw-bold" for="pgSym">Symbols (!@#$)</label></div></div>
</div>
<div class="input-group mb-3">
<input type="text" class="form-control cartoon-input" id="pgOut" readonly style="font-family:monospace;font-size:1.1rem;">
<button class="btn btn-primary cartoon-btn" onclick="genPwd()" style="border-radius:0 15px 15px 0;"><i class="bi bi-arrow-clockwise"></i></button>
</div>
<div id="pgStrength" class="mb-3"></div>
<div class="d-flex gap-2">
<button class="btn cartoon-btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('pgOut').value).then(function(){alert('Copied!');})"><i class="bi bi-copy me-1"></i>Copy Password</button>
<button class="btn btn-outline-success cartoon-btn" onclick="genMulti()"><i class="bi bi-list me-1"></i>Generate 10</button>
</div>
<div id="pgMulti" class="mt-3"></div>
</div></div></div>
<script>
function genPwd(){
  var up=document.getElementById('pgUpper').checked;
  var lo=document.getElementById('pgLower').checked;
  var nm=document.getElementById('pgNums').checked;
  var sy=document.getElementById('pgSym').checked;
  var chars='';
  if(up)chars+='ABCDEFGHIJKLMNOPQRSTUVWXYZ';
  if(lo)chars+='abcdefghijklmnopqrstuvwxyz';
  if(nm)chars+='0123456789';
  if(sy)chars+='!@#$%^&*()_+-=[]{}|;:,.<>?';
  if(!chars)chars='abcdefghijklmnopqrstuvwxyz';
  var len=parseInt(document.getElementById('pgLen').value);
  var pwd='';for(var i=0;i<len;i++)pwd+=chars.charAt(Math.floor(Math.random()*chars.length));
  document.getElementById('pgOut').value=pwd;
  var s=len<8?'Weak':len<12?'Medium':len<16?'Strong':'Very Strong';
  var c=len<8?'danger':len<12?'warning':len<16?'success':'primary';
  document.getElementById('pgStrength').innerHTML='<span class="badge bg-'+c+'">'+s+'</span>';
}
function genMulti(){
  var out=document.getElementById('pgMulti');out.innerHTML='<div class="cartoon-card p-3"><ul class="mb-0">';
  for(var i=0;i<10;i++){genPwd();out.querySelector('ul').innerHTML+='<li style="font-family:monospace;">'+document.getElementById('pgOut').value+'</li>';}
  out.querySelector('ul').innerHTML+='</ul></div>';
}
genPwd();
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
