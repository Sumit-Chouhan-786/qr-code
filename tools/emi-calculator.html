<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>EMI Calculator | OnlineQrs</title>
<meta name="description" content="Loan ki monthly EMI, total interest aur total payment calculate karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-cash-stack" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">EMI Calculator</h1>
<p class="mb-0">Loan ki monthly EMI, total interest aur total payment calculate karo</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Loan Amount (₹):</label>
<input type="number" class="form-control cartoon-input" id="emiAmt" placeholder="500000" oninput="calcEMI()"></div>
<div class="mb-3"><label class="form-label fw-bold">Interest Rate (% per annum):</label>
<input type="number" class="form-control cartoon-input" id="emiRate" placeholder="8.5" step="0.1" oninput="calcEMI()"></div>
<div class="mb-3"><label class="form-label fw-bold">Tenure:</label>
<div class="d-flex gap-2">
<input type="number" class="form-control cartoon-input" id="emiTenure" placeholder="5" oninput="calcEMI()" style="max-width:120px;">
<select class="form-select cartoon-input" id="emiUnit" onchange="calcEMI()"><option value="years">Years</option><option value="months">Months</option></select>
</div></div>
<div id="emiResult" class="result-box" style="display:none;">
<div class="row g-3 text-center mb-3">
<div class="col-4"><div class="cartoon-card p-2"><small>Monthly EMI</small><div class="h5 mb-0" style="color:var(--primary);" id="emiMonthly">₹0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Total Interest</small><div class="h5 mb-0" style="color:var(--danger);" id="emiInterest">₹0</div></div></div>
<div class="col-4"><div class="cartoon-card p-2"><small>Total Payment</small><div class="h5 mb-0" style="color:var(--success);" id="emiTotal">₹0</div></div></div>
</div>
<canvas id="emiChart" height="200"></canvas>
</div>
</div></div></div>
<script src="https://cdn.jsdelivr.net/npm/chart.js@4.4.0/dist/chart.umd.min.js"></script>
<script>
var emiChart=null;
function calcEMI(){
  var P=parseFloat(document.getElementById('emiAmt').value)||0;
  var r=parseFloat(document.getElementById('emiRate').value)||0;
  var t=parseInt(document.getElementById('emiTenure').value)||0;
  var unit=document.getElementById('emiUnit').value;
  var n=unit==='years'?t*12:t;
  if(!P||!r||!n)return;
  var R=r/12/100;
  var emi=P*R*Math.pow(1+R,n)/(Math.pow(1+R,n)-1);
  var total=emi*n;
  var interest=total-P;
  document.getElementById('emiMonthly').textContent='₹'+Math.round(emi).toLocaleString('en-IN');
  document.getElementById('emiInterest').textContent='₹'+Math.round(interest).toLocaleString('en-IN');
  document.getElementById('emiTotal').textContent='₹'+Math.round(total).toLocaleString('en-IN');
  document.getElementById('emiResult').style.display='';
  if(emiChart)emiChart.destroy();
  emiChart=new Chart(document.getElementById('emiChart'),{type:'doughnut',data:{labels:['Principal','Interest'],datasets:[{data:[Math.round(P),Math.round(interest)],backgroundColor:['#d35400','#27ae60']}]},options:{plugins:{legend:{position:'bottom'}}}});
}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
