<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>NOC Generator | OnlineQrs</title>
<meta name="description" content="No Objection Certificate PDF banao — employee, vehicle, tenant">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-file-earmark-check" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">NOC Generator</h1>
<p class="mb-0">No Objection Certificate PDF banao — employee, vehicle, tenant</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">NOC Type:</label>
<select class="form-select cartoon-input" id="nt" onchange="upd()">
<option value="emp">Employee NOC (Job/Visa)</option>
<option value="veh">Vehicle NOC (Transfer)</option>
<option value="ten">Tenant NOC (Landlord)</option>
<option value="bank">Bank NOC (Loan Clearance)</option>
</select></div>
<div id="flds" class="row g-3 mb-3"></div>
<button class="btn cartoon-btn w-100" onclick="gen()"><i class="bi bi-file-pdf me-2"></i>Generate NOC PDF</button>
</div></div></div>
<script>
var tmpl={
  emp:{f:[{id:'issuer',l:'Company Name',p:'ABC Pvt Ltd'},{id:'person',l:'Employee Name',p:'Rahul Sharma'},{id:'desig',l:'Designation',p:'Developer'},{id:'purpose',l:'Purpose',p:'Passport / Foreign Visa'}],
    txt:function(d){return 'To Whomsoever It May Concern

This certifies that '+d.person+', working as '+d.desig+' at '+d.issuer+', has no objection from our organization for '+d.purpose+'.

This NOC is issued on request for genuine purpose only.';}},
  veh:{f:[{id:'owner',l:'Current Owner',p:'Suresh Kumar'},{id:'newown',l:'New Owner',p:'Ramesh Singh'},{id:'vnum',l:'Vehicle Number',p:'MH 01 AB 1234'},{id:'vtype',l:'Vehicle Type',p:'Maruti Swift 2020'}],
    txt:function(d){return 'To The RTO

I, '+d.owner+', have no objection to transfer my vehicle '+d.vnum+' ('+d.vtype+') to '+d.newown+'.

All dues cleared. No legal encumbrances exist.';}},
  ten:{f:[{id:'landlord',l:'Landlord Name',p:'Suresh Kumar'},{id:'tenant',l:'Tenant Name',p:'Rahul Sharma'},{id:'addr',l:'Property Address',p:'Flat 4B, MG Road, Mumbai'},{id:'purpose',l:'Purpose',p:'Bank account / Police verification'}],
    txt:function(d){return 'To Whomsoever It May Concern

I, '+d.landlord+', owner of '+d.addr+', confirm that '+d.tenant+' is a bonafide tenant residing at this address.

I have no objection to use this address for '+d.purpose+'.';}},
  bank:{f:[{id:'bank',l:'Bank Name',p:'State Bank of India'},{id:'borrower',l:'Borrower Name',p:'Rahul Sharma'},{id:'accno',l:'Loan/Account No',p:'LOAN123456'},{id:'amount',l:'Loan Amount (Rs.)',p:'500000'}],
    txt:function(d){return 'To Whomsoever It May Concern

This confirms that '+d.borrower+' (Account: '+d.accno+') has repaid the full loan of Rs.'+d.amount+' from '+d.bank+'.

We have no objection or claim on any property/assets of the borrower.';}}
};
function upd(){
  var t=document.getElementById('nt').value,tm=tmpl[t];
  var div=document.getElementById('flds');div.innerHTML='';
  tm.f.forEach(function(f){var col=document.createElement('div');col.className='col-md-6';col.innerHTML='<label class="form-label fw-bold">'+f.l+'</label><input type="text" class="form-control cartoon-input" id="'+f.id+'" placeholder="'+f.p+'">';div.appendChild(col);});
}
function gen(){
  var t=document.getElementById('nt').value,tm=tmpl[t],d={};
  tm.f.forEach(function(f){d[f.id]=(document.getElementById(f.id)||{value:''}).value.trim();});
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF();
  pdf.setFontSize(16);pdf.setFont(undefined,'bold');pdf.setTextColor(211,84,0);
  pdf.text('NO OBJECTION CERTIFICATE',105,25,{align:'center'});
  pdf.setFontSize(10);pdf.setTextColor(100);pdf.text('Date: '+new Date().toLocaleDateString('en-IN'),180,35,{align:'right'});
  pdf.setFontSize(11);pdf.setTextColor(0);pdf.setFont(undefined,'normal');
  var txt=tm.txt(d),lines=pdf.splitTextToSize(txt,170);pdf.text(lines,20,50);
  var y=50+lines.length*6+30;
  pdf.text('Yours sincerely,',20,y);y+=20;pdf.line(20,y,80,y);y+=6;
  pdf.text(d.issuer||d.landlord||d.bank||'Authorized Signatory',20,y);y+=6;
  pdf.text('Stamp / Seal: _______________',20,y);
  pdf.setFontSize(8);pdf.setTextColor(150);pdf.text('Generated by OnlineQrs.com',105,285,{align:'center'});
  pdf.save('NOC.pdf');
}
upd();
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
