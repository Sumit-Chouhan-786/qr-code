<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>GST Invoice Generator | OnlineQrs</title>
<meta name="description" content="GST compliant tax invoice banao — GSTIN, HSN codes ke saath">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-receipt-cutoff" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">GST Invoice Generator</h1>
<p class="mb-0">GST compliant tax invoice banao — GSTIN, HSN codes ke saath</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-9">
<div class="cartoon-card p-4">
<div class="row g-3 mb-3">
<div class="col-md-6"><label class="form-label fw-bold">Seller Name *</label><input type="text" class="form-control cartoon-input" id="sn" placeholder="ABC Traders"></div>
<div class="col-md-6"><label class="form-label fw-bold">Seller GSTIN</label><input type="text" class="form-control cartoon-input" id="sg" placeholder="27ABCDE1234F1Z5" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()"></div>
<div class="col-md-6"><label class="form-label fw-bold">Seller Address</label><input type="text" class="form-control cartoon-input" id="sa" placeholder="Mumbai, Maharashtra"></div>
<div class="col-md-6"><label class="form-label fw-bold">Buyer Name *</label><input type="text" class="form-control cartoon-input" id="bn" placeholder="Client Company"></div>
<div class="col-md-6"><label class="form-label fw-bold">Buyer GSTIN</label><input type="text" class="form-control cartoon-input" id="bg" placeholder="27XYZAB5678G1Z1" style="text-transform:uppercase;" oninput="this.value=this.value.toUpperCase()"></div>
<div class="col-md-6"><label class="form-label fw-bold">Buyer Address</label><input type="text" class="form-control cartoon-input" id="ba" placeholder="Pune, Maharashtra"></div>
<div class="col-md-6"><label class="form-label fw-bold">Invoice No.</label><input type="text" class="form-control cartoon-input" id="ino"></div>
<div class="col-md-6"><label class="form-label fw-bold">Invoice Date</label><input type="date" class="form-control cartoon-input" id="idate"></div>
</div>
<h6 style="color:var(--primary);">Items</h6>
<div id="gitems"></div>
<button class="btn btn-outline-success cartoon-btn btn-sm mb-3" onclick="addGI()"><i class="bi bi-plus-circle me-1"></i>Add Item</button>
<div class="mb-3"><label class="form-label fw-bold">GST Type:</label>
<select class="form-select cartoon-input" id="gt" onchange="calcGI()"><option value="igst">IGST (Inter-state)</option><option value="cgst" selected>CGST+SGST (Intra-state)</option></select></div>
<div id="gtot" class="result-box mb-3" style="display:none;"></div>
<button class="btn cartoon-btn w-100" onclick="genGST()"><i class="bi bi-file-pdf me-2"></i>Generate GST Invoice PDF</button>
</div></div></div>
<script>
var gi=[];
document.getElementById('idate').valueAsDate=new Date();
document.getElementById('ino').value='INV-'+new Date().getFullYear()+'-'+String(Date.now()).slice(-4);
function addGI(){
  var id=gi.length;gi.push({desc:'',hsn:'',qty:1,rate:0,gst:18});
  var div=document.createElement('div');div.className='row g-1 mb-2 align-items-center';div.id='gi'+id;
  div.innerHTML='<div class="col-3"><input type="text" class="form-control cartoon-input" placeholder="Description" style="font-size:.82rem;padding:.4rem;" oninput="gi['+id+'].desc=this.value"></div>'
    +'<div class="col-2"><input type="text" class="form-control cartoon-input" placeholder="HSN" style="font-size:.82rem;padding:.4rem;" oninput="gi['+id+'].hsn=this.value"></div>'
    +'<div class="col-1"><input type="number" class="form-control cartoon-input" value="1" style="font-size:.82rem;padding:.4rem;" oninput="gi['+id+'].qty=+this.value;calcGI()"></div>'
    +'<div class="col-2"><input type="number" class="form-control cartoon-input" placeholder="Rate" style="font-size:.82rem;padding:.4rem;" oninput="gi['+id+'].rate=+this.value;calcGI()"></div>'
    +'<div class="col-2"><select class="form-select cartoon-input" style="font-size:.82rem;padding:.4rem;" onchange="gi['+id+'].gst=+this.value;calcGI()"><option value="0">0%</option><option value="5">5%</option><option value="12">12%</option><option value="18" selected>18%</option><option value="28">28%</option></select></div>'
    +'<div class="col-2"><button class="btn btn-danger btn-sm cartoon-btn" onclick="document.getElementById('gi'+id+'').remove();gi['+id+']={qty:0,rate:0,gst:0};calcGI()"><i class="bi bi-trash"></i></button></div>';
  document.getElementById('gitems').appendChild(div);
}
function calcGI(){
  var t=document.getElementById('gt').value;
  var sub=gi.reduce(function(s,i){return s+i.qty*i.rate;},0);
  var gst=gi.reduce(function(s,i){return s+i.qty*i.rate*i.gst/100;},0);
  var html='<div class="d-flex justify-content-between"><span>Taxable Amount:</span><span>Rs.'+sub.toFixed(2)+'</span></div>';
  if(t==='cgst')html+='<div class="d-flex justify-content-between"><span>CGST:</span><span>Rs.'+(gst/2).toFixed(2)+'</span></div><div class="d-flex justify-content-between"><span>SGST:</span><span>Rs.'+(gst/2).toFixed(2)+'</span></div>';
  else html+='<div class="d-flex justify-content-between"><span>IGST:</span><span>Rs.'+gst.toFixed(2)+'</span></div>';
  html+='<hr><div class="d-flex justify-content-between h5 fw-bold"><span>Grand Total:</span><span style="color:var(--primary);">Rs.'+(sub+gst).toFixed(2)+'</span></div>';
  document.getElementById('gtot').innerHTML=html;document.getElementById('gtot').style.display='';
}
function genGST(){
  var sn=document.getElementById('sn').value.trim(),bn=document.getElementById('bn').value.trim();
  if(!sn||!bn){alert('Seller aur Buyer name required.');return;}
  var jsPDF=window.jspdf.jsPDF,pdf=new jsPDF();
  pdf.setFillColor(211,84,0);pdf.rect(0,0,210,18,'F');
  pdf.setTextColor(255);pdf.setFontSize(13);pdf.setFont(undefined,'bold');pdf.text('TAX INVOICE',105,12,{align:'center'});
  pdf.setTextColor(0);pdf.setFontSize(9);pdf.setFont(undefined,'normal');
  var y=26;
  pdf.setFont(undefined,'bold');pdf.text('SELLER',14,y);pdf.text('BUYER',110,y);y+=5;
  pdf.setFont(undefined,'normal');
  pdf.text(sn,14,y);pdf.text(bn,110,y);y+=5;
  pdf.text('GSTIN: '+document.getElementById('sg').value,14,y);
  var bg2=document.getElementById('bg').value;if(bg2)pdf.text('GSTIN: '+bg2,110,y);y+=5;
  pdf.text(document.getElementById('sa').value,14,y);pdf.text(document.getElementById('ba').value,110,y);y+=10;
  pdf.text('Invoice No: '+document.getElementById('ino').value,14,y);
  pdf.text('Date: '+document.getElementById('idate').value,110,y);y+=10;
  pdf.setFillColor(211,84,0);pdf.rect(14,y,182,7,'F');pdf.setTextColor(255);pdf.setFont(undefined,'bold');
  pdf.text('Item',16,y+5);pdf.text('HSN',85,y+5);pdf.text('Qty',105,y+5);pdf.text('Rate',122,y+5);pdf.text('GST%',143,y+5);pdf.text('Amount',172,y+5);y+=11;
  pdf.setTextColor(0);pdf.setFont(undefined,'normal');
  var sub=0,gstT=0;
  gi.forEach(function(it){
    if(!it.rate&&!it.qty)return;
    var amt=it.qty*it.rate,g=amt*it.gst/100;sub+=amt;gstT+=g;
    pdf.text((it.desc||'').substring(0,18),16,y);pdf.text(it.hsn||'',85,y);pdf.text(String(it.qty),105,y);
    pdf.text('Rs.'+it.rate.toFixed(2),122,y);pdf.text(it.gst+'%',143,y);pdf.text('Rs.'+amt.toFixed(2),172,y);y+=7;
  });
  y+=4;pdf.line(14,y,196,y);y+=7;
  var t2=document.getElementById('gt').value;
  pdf.text('Taxable: Rs.'+sub.toFixed(2),120,y);y+=6;
  if(t2==='cgst'){pdf.text('CGST: Rs.'+(gstT/2).toFixed(2),120,y);y+=6;pdf.text('SGST: Rs.'+(gstT/2).toFixed(2),120,y);y+=6;}
  else{pdf.text('IGST: Rs.'+gstT.toFixed(2),120,y);y+=6;}
  pdf.setFont(undefined,'bold');pdf.setFontSize(11);pdf.setTextColor(211,84,0);
  pdf.text('Grand Total: Rs.'+(sub+gstT).toFixed(2),120,y);
  pdf.setFontSize(8);pdf.setTextColor(150);pdf.setFont(undefined,'normal');pdf.text('Generated by OnlineQrs.com',105,285,{align:'center'});
  pdf.save('GST-Invoice-'+document.getElementById('ino').value+'.pdf');
}
addGI();
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="https://cdn.jsdelivr.net/npm/jspdf@2.5.1/dist/jspdf.umd.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
