<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Signature Maker | OnlineQrs</title>
<meta name="description" content="Apna digital signature banao — draw ya type karo, PNG download karo">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-pen" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Signature Maker</h1>
<p class="mb-0">Apna digital signature banao — draw ya type karo, PNG download karo</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="d-flex gap-2 mb-3">
<button class="btn cartoon-btn btn-sm" onclick="sw('d',this)">Draw</button>
<button class="btn btn-outline-success cartoon-btn btn-sm" onclick="sw('t',this)">Type</button>
</div>
<div id="dv">
<div class="d-flex gap-2 align-items-center mb-2 flex-wrap">
<label class="fw-bold">Color:</label>
<input type="color" id="sc" value="#1a1a1a" style="width:40px;height:36px;border:2px solid var(--primary);border-radius:8px;">
<label class="fw-bold ms-2">Size:</label>
<input type="range" id="ss" min="1" max="8" value="3" style="width:100px;">
<button class="btn btn-sm btn-outline-success cartoon-btn" onclick="clr()"><i class="bi bi-trash me-1"></i>Clear</button>
</div>
<canvas id="dc" width="600" height="200" style="width:100%;border:3px solid var(--primary);border-radius:14px;background:#fff;cursor:crosshair;touch-action:none;"></canvas>
</div>
<div id="tv" style="display:none;">
<div class="row g-2 mb-2">
<div class="col-md-8"><input type="text" class="form-control cartoon-input" id="st" placeholder="Your Signature Name" oninput="rts()"></div>
<div class="col-md-4"><select class="form-select cartoon-input" id="sf" onchange="rts()"><option value="cursive">Cursive</option><option value="serif">Serif</option><option value="fantasy">Fantasy</option></select></div>
</div>
<canvas id="tc" width="600" height="200" style="width:100%;border:3px solid var(--primary);border-radius:14px;background:#fff;"></canvas>
</div>
<div class="mt-3 d-flex gap-2 flex-wrap">
<button class="btn btn-success cartoon-btn" onclick="dlS(false)"><i class="bi bi-download me-2"></i>Download PNG (White BG)</button>
<button class="btn btn-outline-success cartoon-btn" onclick="dlS(true)"><i class="bi bi-download me-2"></i>Download (Transparent)</button>
</div>
</div></div></div>
<script>
var tab='d',drawing=false,cv=document.getElementById('dc'),ctx=cv.getContext('2d');
ctx.lineCap='round';ctx.lineJoin='round';
function gp(e,c){var r=c.getBoundingClientRect(),sc=c.width/r.width;var x,y;if(e.touches){x=(e.touches[0].clientX-r.left)*sc;y=(e.touches[0].clientY-r.top)*sc;}else{x=(e.clientX-r.left)*sc;y=(e.clientY-r.top)*sc;}return{x:x,y:y};}
cv.addEventListener('mousedown',function(e){drawing=true;var p=gp(e,cv);ctx.beginPath();ctx.moveTo(p.x,p.y);});
cv.addEventListener('mousemove',function(e){if(!drawing)return;var p=gp(e,cv);ctx.strokeStyle=document.getElementById('sc').value;ctx.lineWidth=parseInt(document.getElementById('ss').value);ctx.lineTo(p.x,p.y);ctx.stroke();});
cv.addEventListener('mouseup',function(){drawing=false;});
cv.addEventListener('touchstart',function(e){e.preventDefault();drawing=true;var p=gp(e,cv);ctx.beginPath();ctx.moveTo(p.x,p.y);},{passive:false});
cv.addEventListener('touchmove',function(e){e.preventDefault();if(!drawing)return;var p=gp(e,cv);ctx.strokeStyle=document.getElementById('sc').value;ctx.lineWidth=parseInt(document.getElementById('ss').value);ctx.lineTo(p.x,p.y);ctx.stroke();},{passive:false});
cv.addEventListener('touchend',function(){drawing=false;});
function clr(){ctx.clearRect(0,0,cv.width,cv.height);}
function sw(t,btn){tab=t;document.getElementById('dv').style.display=t==='d'?'':'none';document.getElementById('tv').style.display=t==='t'?'':'none';}
function rts(){var tc=document.getElementById('tc'),tctx=tc.getContext('2d');tctx.clearRect(0,0,tc.width,tc.height);tctx.fillStyle='#1a1a1a';tctx.font='bold 64px '+document.getElementById('sf').value;tctx.textAlign='center';tctx.textBaseline='middle';tctx.fillText(document.getElementById('st').value||'Signature',tc.width/2,tc.height/2);}
function dlS(trans){
  var src=tab==='d'?cv:document.getElementById('tc');
  if(trans){var a=document.createElement('a');a.download='signature.png';a.href=src.toDataURL();a.click();}
  else{var tmp=document.createElement('canvas');tmp.width=src.width;tmp.height=src.height;var t=tmp.getContext('2d');t.fillStyle='#fff';t.fillRect(0,0,tmp.width,tmp.height);t.drawImage(src,0,0);var a=document.createElement('a');a.download='signature.png';a.href=tmp.toDataURL();a.click();}
}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
