<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Shop Hours QR Generator | OnlineQrs</title>
<meta name="description" content="Apni dukan ki timing ka QR banao — customers scan karein">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-clock" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">Shop Hours QR Generator</h1>
<p class="mb-0">Apni dukan ki timing ka QR banao — customers scan karein</p>
</div>
</header>
<main class="container pb-5"><div class="row justify-content-center"><div class="col-lg-7">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Shop Name *</label><input type="text" class="form-control cartoon-input" id="sn" placeholder="Rahul General Store"></div>
<div class="mb-3"><label class="form-label fw-bold">Address</label><input type="text" class="form-control cartoon-input" id="sa" placeholder="Shop No 5, MG Road, Mumbai"></div>
<div class="mb-3"><label class="form-label fw-bold">Phone</label><input type="text" class="form-control cartoon-input" id="sp" placeholder="+91 98765 43210"></div>
<h6 class="fw-bold mt-3 mb-2" style="color:var(--primary);">Opening Hours</h6>
<div id="hrs"></div>
<button class="btn cartoon-btn w-100 mt-3" onclick="genQR()"><i class="bi bi-magic me-2"></i>Generate QR</button>
<div id="res" class="result-box text-center mt-3" style="display:none;">
<div id="qrDiv" class="d-inline-block mb-3"></div>
<div><button class="btn btn-success cartoon-btn" onclick="dl()"><i class="bi bi-download me-2"></i>Download QR</button></div>
</div>
</div></div></div>
<script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
<script>
var days=['Monday','Tuesday','Wednesday','Thursday','Friday','Saturday','Sunday'];
var cont=document.getElementById('hrs');
days.forEach(function(d,i){
  var r=document.createElement('div');r.className='row g-2 mb-2 align-items-center';
  r.innerHTML='<div class="col-3"><small class="fw-bold">'+d.substr(0,3)+'</small></div><div class="col-3"><input type="time" class="form-control cartoon-input" id="o'+i+'" value="09:00" style="padding:.4rem;font-size:.85rem;"></div><div class="col-3"><input type="time" class="form-control cartoon-input" id="c'+i+'" value="21:00" style="padding:.4rem;font-size:.85rem;"></div><div class="col-3"><div class="form-check"><input type="checkbox" class="form-check-input" id="cl'+i+'"><label class="form-check-label" for="cl'+i+'">Closed</label></div></div>';
  cont.appendChild(r);
});
function genQR(){
  var nm=document.getElementById('sn').value.trim();if(!nm){alert('Shop name required');return;}
  var txt=nm+'
';
  var a=document.getElementById('sa').value.trim();if(a)txt+='Address: '+a+'
';
  var p=document.getElementById('sp').value.trim();if(p)txt+='Phone: '+p+'
';
  txt+='
Hours:
';
  days.forEach(function(d,i){txt+=d+': '+(document.getElementById('cl'+i).checked?'Closed':document.getElementById('o'+i).value+'-'+document.getElementById('c'+i).value)+'
';});
  var div=document.getElementById('qrDiv');div.innerHTML='';
  new QRCode(div,{text:txt,width:220,height:220,colorDark:'#d35400',colorLight:'#ffffff',correctLevel:QRCode.CorrectLevel.H});
  document.getElementById('res').style.display='';
}
function dl(){var c=document.querySelector('#qrDiv canvas');if(!c)return;var a=document.createElement('a');a.download='shop-hours-qr.png';a.href=c.toDataURL();a.click();}
</script></main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
