<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>URL Encoder / Decoder | OnlineQrs</title>
<meta name="description" content="URL encode ya decode karo instantly">
<link rel="icon" type="image/x-icon" href="../assets/logo.webp">
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.10.0/font/bootstrap-icons.css">
<link href="https://fonts.googleapis.com/css2?family=Comic+Neue:wght@400;700&display=swap" rel="stylesheet">
<link rel="stylesheet" href="../shared.css">
<script async src="https://pagead2.googlesyndication.com/pagead/js/adsbygoogle.js?client=ca-pub-7565474923776604" crossorigin="anonymous"></script>
</head>
<body>
<header class="tool-hero">
<div class="container text-center">
<i class="bi bi-link-45deg" style="font-size:2.5rem;color:#000;"></i>
<h1 class="mt-2 mb-1">URL Encoder / Decoder</h1>
<p class="mb-0">URL encode ya decode karo instantly</p>
</div>
</header>
<main class="container pb-5">

<div class="row justify-content-center"><div class="col-lg-8">
<div class="cartoon-card p-4">
<div class="mb-3"><label class="form-label fw-bold">Input:</label>
<textarea class="form-control cartoon-input" id="urlIn" rows="5" placeholder="URL ya text yahan paste karo..."></textarea></div>
<div class="d-flex flex-wrap gap-2 mb-3">
<button class="btn cartoon-btn" onclick="urlEncode()"><i class="bi bi-lock me-1"></i>Encode</button>
<button class="btn btn-outline-success cartoon-btn" onclick="urlDecode()"><i class="bi bi-unlock me-1"></i>Decode</button>
<button class="btn cartoon-btn" onclick="b64Encode()"><i class="bi bi-code-slash me-1"></i>Base64 Encode</button>
<button class="btn btn-outline-success cartoon-btn" onclick="b64Decode()"><i class="bi bi-code me-1"></i>Base64 Decode</button>
</div>
<div class="mb-3"><label class="form-label fw-bold">Output:</label>
<textarea class="form-control cartoon-input" id="urlOut" rows="5" readonly></textarea></div>
<button class="btn btn-primary cartoon-btn" onclick="navigator.clipboard&&navigator.clipboard.writeText(document.getElementById('urlOut').value)"><i class="bi bi-copy me-1"></i>Copy</button>
</div></div></div>
<script>
function urlEncode(){document.getElementById('urlOut').value=encodeURIComponent(document.getElementById('urlIn').value);}
function urlDecode(){try{document.getElementById('urlOut').value=decodeURIComponent(document.getElementById('urlIn').value);}catch(e){alert('Invalid encoded URL');}}
function b64Encode(){document.getElementById('urlOut').value=btoa(unescape(encodeURIComponent(document.getElementById('urlIn').value)));}
function b64Decode(){try{document.getElementById('urlOut').value=decodeURIComponent(escape(atob(document.getElementById('urlIn').value)));}catch(e){alert('Invalid Base64 string');}}
</script>

</main>
<div id="other-tools-placeholder"></div>
<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../shared.js"></script>
</body>
</html>
